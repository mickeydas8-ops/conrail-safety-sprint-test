<body><div class="wrap"><div class="app-shell"><header class="topbar"><button class="menu-btn" onclick="openRulesDrawer()" title="Rules search">☰</button><div class="logo" aria-label="SafeTrack logo"><img src="safetrack-yellow-192-v100.png?v=100" alt="SafeTrack" style="width:52px;height:52px;border-radius:15px;object-fit:cover"></div><div class="title"><h1>SafeTrack</h1><p>Make the safe move, not the fast move.</p></div></header><div id="drawerRoot"></div><main id="app"></main><div class="footer-space"></div></div></div><script>

const monthKey=(d=now())=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');

const seed={
 user:null, screen:'login', tab:'play', viewMode:'auto', settings:{teamsEnabled:true,focusSection:'All',ruleOfWeekId:'OR-101',lastMonthlyAlertMonth:null,soundEnabled:true}, team:'north', tickets:0, streak:0, correctStreak:0, bestCorrectStreak:0, badges:[], sessions:[], answers:[], monthlyWinners:[

 ], players:[

 ], questions:[
  {id:'q1',rule:'OR-101',section:'Operating Rules',difficulty:'Easy',question:'You see conflicting instructions before a move. What should you do first?',choices:['Keep moving if the track looks clear','Ask about it after the move','Stop and verify the instruction','Ignore the newer instruction'],correct:2,explanation:'When instructions conflict, stop and verify before continuing.',active:true},
  {id:'q2',rule:'SAFE-201',section:'Personal Safety',difficulty:'Easy',question:'A shortcut saves time but skips required protection. What is the safe choice?',choices:['Take the shortcut if no one sees','Skip only if behind schedule','Use the required safe procedure','Let the newest employee decide'],correct:2,explanation:'Required protection and safe procedure always come before speed.',active:true},
  {id:'q3',rule:'PPE-301',section:'PPE',difficulty:'Easy',question:'Required PPE is missing before entering a work area. What should happen?',choices:['Enter quickly','Borrow later','Stop until PPE is corrected','Work farther away'],correct:2,explanation:'Do not enter the work area until required PPE is in place.',active:true},
  {id:'q4',rule:'COMM-401',section:'Communication',difficulty:'Medium',question:'A radio message is unclear during a movement. What should you do?',choices:['Guess the message','Continue slowly','Stop and request clarification','Use hand signals later'],correct:2,explanation:'Unclear communication must be clarified before action continues.',active:true},
  {id:'q5',rule:'YARD-501',section:'Yard Safety',difficulty:'Medium',question:'You are unsure if the route is properly lined. What is the right move?',choices:['Proceed because it was lined yesterday','Stop and verify the route','Ask after passing it','Let the timer decide'],correct:1,explanation:'When unsure, stop and verify the route before proceeding.',active:true},
  {id:'q6',rule:'HAZ-601',section:'Hazmat',difficulty:'Medium',question:'You see a possible leak or unknown spill near equipment. What comes first?',choices:['Touch it to identify it','Move closer for a photo','Stay clear and report it','Wash it away'],correct:2,explanation:'Stay clear and report possible hazmat concerns immediately.',active:true}
 ],
 rules:[
  {id:'OR-101',title:'Conflicting Instructions',section:'Operating Rules',text:'If instructions conflict or are unclear, stop, verify, and clarify before continuing. Do not guess.',active:true},
  {id:'SAFE-201',title:'No Shortcuts Around Protection',section:'Personal Safety',text:'Required protection and safe work procedures must be followed every time, even when work is delayed.',active:true},
  {id:'PPE-301',title:'Required PPE',section:'PPE',text:'Employees must use required PPE before entering designated work areas or performing tasks requiring protection.',active:true},
  {id:'COMM-401',title:'Clear Communication',section:'Communication',text:'Unclear radio, verbal, or written communication must be repeated or clarified before action is taken.',active:true},
  {id:'YARD-501',title:'Verify Route and Conditions',section:'Yard Safety',text:'When unsure about route, track condition, or authority, stop and verify before proceeding.',active:true},
  {id:'HAZ-601',title:'Unknown Spill or Leak',section:'Hazmat',text:'Stay clear of possible hazardous materials and report immediately through approved channels.',active:true}
 ]
};
let S=load(); window.S=S; let game=null;

function ensureV10(){
 S.profile=S.profile||{craft:'Conductor',hireYear:'2020',injuryMilestone:'Prefer not to show',avatarId:'orange-vest'};
 S.invites=S.invites||[];
 S.settings=S.settings||{}; S.settings.profileVisibility=S.settings.profileVisibility||{craft:true,hireYear:true,badges:true,scores:true,invites:true};
 S.daily=S.daily||{lastBonusDate:null,dayCount:0};
 const names=['TrackBoss92','RailRanger','BrakeCheckBen','SignalSam','YardHawkJoe','RuleReadyRob','LanternLou','SafeMoveSal','CrewCat','SwitchStand'];
 const crafts=['Engineer','Conductor','Mechanical','Yard','Signal','Track','Manager'];
 S.players=(S.players||[]).map((p,i)=>Object.assign({email:(p.nick||names[i]||'player').toLowerCase().replace(/[^a-z0-9]/g,'')+'@conrail.com',craft:crafts[i%crafts.length],hireYear:String(2012+i),badges:['Rule Ready'],avatarId:AVATARS[Math.min(i+1,AVATARS.length-1)].id},p));
 if(!S.players.find(p=>p.nick==='Mickey'))S.players.push({nick:'Mickey',email:'mickey.dasilva@conrail.com',team:currentTeam()?.name||'North Jersey Crew',month:monthPoints(),year:points(),craft:S.profile.craft,hireYear:S.profile.hireYear,badges:S.badges||[],avatarId:S.profile.avatarId});
}
const AVATARS=[
 {id:'rule-book',name:'Rule Book',tier:'Starter / New Hire',points:0,icon:'📘'},
 {id:'orange-vest',name:'Orange Safety Vest',tier:'Starter / New Hire',points:0,icon:'🦺'},
 {id:'basic-hard-hat',name:'Basic Hard Hat',tier:'Starter / New Hire',points:0,icon:'⛑️'},
 {id:'lantern',name:'Lantern',tier:'Rookie',points:500,icon:'🏮'},
 {id:'track-wrench',name:'Track Wrench',tier:'Rookie',points:500,icon:'🔧'},
 {id:'brake-wheel',name:'Brake Wheel',tier:'Rookie',points:500,icon:'⚙️'},
 {id:'hard-hat-pro',name:'Hard Hat Pro',tier:'Skilled',points:1500,icon:'👷'},
 {id:'radio-ready',name:'Radio Ready',tier:'Skilled',points:1500,icon:'📻'},
 {id:'track-badge',name:'Track Badge',tier:'Skilled',points:1500,icon:'🛡️'},
 {id:'locomotive-badge',name:'Locomotive Badge',tier:'Advanced',points:3000,icon:'🚂'},
 {id:'crew-shield',name:'Crew Shield',tier:'Advanced',points:3000,icon:'👥'},
 {id:'yard-hawk',name:'Yard Hawk',tier:'Advanced',points:3000,icon:'🦅'},
 {id:'gold-hard-hat',name:'Gold Hard Hat',tier:'Expert',points:5000,icon:'🥇'},
 {id:'rule-master',name:'Rule Master',tier:'Expert',points:5000,icon:'📖'},
 {id:'trackwise-badge',name:'TrackWise Badge',tier:'Expert',points:5000,icon:'🛠️'},
 {id:'safetrack-champion',name:'SafeTrack Champion',tier:'Elite',points:10000,icon:'🏆'},
 {id:'crew-captain',name:'Crew Captain',tier:'Elite',points:10000,icon:'🧢'},
 {id:'steel-shield',name:'Steel Shield',tier:'Elite',points:10000,icon:'🔰'},
 {id:'yard-legend',name:'Yard Legend',tier:'Legend / Promoted',points:25000,icon:'🌆'},
 {id:'master-conductor',name:'Master Conductor',tier:'Legend / Promoted',points:25000,icon:'🎖️'},
 {id:'iron-rule-badge',name:'Iron Rule Badge',tier:'Legend / Promoted',points:25000,icon:'🏅'},
 {id:'yellow-vest',name:'Yellow Reflective Vest',tier:'Legend / Promoted',points:25000,icon:'✨'}
];
function avatar(id){return AVATARS.find(a=>a.id===id)||AVATARS[1]}
function canUseAvatar(a){return points()>=a.points || (a.id==='yellow-vest' && (S.profile?.craft||'').toLowerCase().includes('conductor') && points()>=10000)}
function avatarHtml(id,cls=''){const a=avatar(id); return `<div class="avatar ${cls}" title="${esc(a.name)}"><span>${a.icon}</span></div>`}
function nextAvatar(){return AVATARS.find(a=>!canUseAvatar(a))}
function todayKey(){return new Date().toISOString().slice(0,10)}
function safeDayBonusValue(){return Math.min(7,(S.daily?.dayCount||0)+1)*10}

function load(){try{let s=JSON.parse(localStorage.getItem(LS)||'null'); if(!s)return structuredClone(seed); return merge(structuredClone(seed),s)}catch(e){return structuredClone(seed)}}
function merge(a,b){for(const k in b){if(b[k]&&typeof b[k]==='object'&&!Array.isArray(b[k])&&a[k])a[k]=merge(a[k],b[k]);else a[k]=b[k]}return a}
function save(){window.S=S;localStorage.setItem(LS,JSON.stringify(S));applyViewMode()}
function esc(x){return String(x??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function uid(p){return p+Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function sections(){return ['All',...Array.from(new Set(S.rules.filter(r=>r.active).map(r=>r.section).concat(S.questions.filter(q=>q.active).map(q=>q.section))))].filter(Boolean)}
function qPool(){let qs=S.questions.filter(q=>q.active); if(S.settings.focusSection&&S.settings.focusSection!=='All')qs=qs.filter(q=>q.section===S.settings.focusSection); if(qs.length<1)qs=S.questions.filter(q=>q.active); return qs}
function points(){return S.sessions.reduce((n,s)=>n+(s.score||0),0)}
function monthPoints(){return S.sessions.filter(s=>s.month===monthKey()).reduce((n,s)=>n+s.score,0)}
function level(){const p=points(); if(p>=15000)return 'Blue Badge Boss'; if(p>=10000)return 'Rule Wrangler'; if(p>=6000)return 'Safety Switchman'; if(p>=3000)return 'Signal Spotter'; if(p>=1000)return 'Track Trainee'; return 'Yard Rookie'}
function rule(id){return S.rules.find(r=>r.id===id)||S.rules[0]}
function currentTeam(){return S.teams.find(t=>t.id===S.team)||S.teams[0]}
function activeRewards(){return S.rewards.filter(r=>r.active)}
ensureV10(); window.S=S; save();
function bossUnlocked(){return (S.correctStreak||0)>=25}
function bossProgress(){return Math.min(25,S.correctStreak||0)}
function playTone(freq,start,dur,gain,type='sine'){try{const C=window.AudioContext||window.webkitAudioContext; if(!C||!S.settings.soundEnabled)return; const ctx=window.__audioCtx||(window.__audioCtx=new C()); const osc=ctx.createOscillator(); const g=ctx.createGain(); osc.type=type; osc.frequency.setValueAtTime(freq,ctx.currentTime+start); g.gain.setValueAtTime(gain,ctx.currentTime+start); g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+start+dur); osc.connect(g); g.connect(ctx.destination); osc.start(ctx.currentTime+start); osc.stop(ctx.currentTime+start+dur+.03)}catch(e){}}
function sound(kind){if(!S.settings.soundEnabled)return; if(kind==='correct'){playTone(196,0,.32,.08,'sawtooth');playTone(247,.07,.34,.07,'sawtooth');playTone(294,.14,.36,.06,'sawtooth')} else {playTone(180,0,.22,.10,'square');playTone(180,.28,.22,.09,'square')}}
function monthlyWinners(){let team=[...S.teams].sort((a,b)=>(b.monthly||0)-(a.monthly||0))[0]; let solo=[...S.players,{nick:S.user?.nick||'You',team:currentTeam()?.name||'No Team',month:monthPoints(),year:points()}].sort((a,b)=>(b.month||0)-(a.month||0))[0]; return {team,solo,month:monthKey()}}
function maybeAlertAdmin(){if(!S.user||S.user.role!=='admin')return ''; const d=now(); const lastDay=new Date(d.getFullYear(),d.getMonth()+1,0).getDate(); if(d.getDate()>=28 && S.settings.lastMonthlyAlertMonth!==monthKey()){const w=monthlyWinners(); return `<div class="card winner"><h2>🏆 Month-End Admin Alert</h2><p><b>Team winner:</b> ${esc(w.team.name)} with ${w.team.monthly||0} monthly points.</p><p><b>Solo leader:</b> ${esc(w.solo.nick)} with ${w.solo.month||0} monthly points.</p><button class="btn full yellow" onclick="archiveMonth()">Archive This Month & Reset Monthly Board</button><p class="small">Shown near month end so rewards can be prepared. This prototype can also be archived manually.</p></div>`} return ''}
function applyViewMode(){document.body.classList.remove('mobile-mode','desktop-mode'); if(S.viewMode==='mobile')document.body.classList.add('mobile-mode'); if(S.viewMode==='desktop')document.body.classList.add('desktop-mode')}
function nav(active){const items=[['play','Home'],['teams','Teams'],['profiles','Profiles'],['rules','Rules'],['board','Board'],['rewards','Rewards'],['me','Me']];return `<nav class="tabs">${items.map(([k,v])=>`<button class="tab ${active===k?'active':''}" onclick="go('${k}')">${v}</button>`).join('')}</nav>`}
window.go=function(t){S.tab=t;S.screen='home';save();render()}
window.resetApp=function(){if(confirm('Reset local demo app data?')){localStorage.removeItem(LS);S=structuredClone(seed);window.S=S;game=null;render()}}
window.login=function(){const email=document.getElementById('email').value.trim().toLowerCase(); if(!email.endsWith('@conrail.com')){toast('Wrong track. Use an @conrail.com email.');return} S.user={email,nick:'',role:email.includes('manager')||email.includes('admin')?'admin':'employee'}; S.screen='profile'; save();render()}
window.demo=function(){S.user={email:'demo.manager@conrail.com',nick:'Big Mike',role:'admin'};S.screen='home';S.tab='play';save();render()}
window.saveProfile=function(){S.user.nick=document.getElementById('nick').value.trim()||'SafeTracker'; S.profile.craft=document.getElementById('craft').value; S.profile.hireYear=document.getElementById('hireYear').value.trim()||S.profile.hireYear; S.profile.injuryMilestone=document.getElementById('injuryMilestone').value; const t=document.getElementById('team').value.trim(); if(t){let found=S.teams.find(x=>x.name.toLowerCase()===t.toLowerCase()); if(!found){found={id:uid('team'),name:t,points:0,members:1,monthly:0,yearly:0};S.teams.push(found)} S.team=found.id} S.screen='home';save();render()}
window.startGame=function(mode='daily'){if(mode==='boss'&&!bossUnlocked()){toast('Final Rule Check locked: get 25 correct answers in a row first.');return} let pool=[...qPool()].sort(()=>Math.random()-.5); const n=mode==='boss'?10:5; while(pool.length<n&&pool.length>0)pool=pool.concat([...pool].sort(()=>Math.random()-.5)); game={mode,i:0,score:0,correct:0,answers:[],qs:pool.slice(0,n)}; if(!game.qs.length){toast('No active questions found. Add questions in Admin.');return} S.screen='game';save();render()}
window.answer=function(idx){const q=game.qs[game.i], ok=idx===q.correct; const mult=game.mode==='boss'?2:1; let add=ok?100*mult:0; if(ok&&game.answers.filter(a=>a.ok).length===2)add+=100*mult; game.score+=add; game.correct+=ok?1:0; if(ok){S.correctStreak=(S.correctStreak||0)+1;S.bestCorrectStreak=Math.max(S.bestCorrectStreak||0,S.correctStreak)}else{S.correctStreak=0} sound(ok?'correct':'wrong'); game.answers.push({qid:q.id,rule:q.rule,sel:idx,ok,section:q.section,month:monthKey(),year:yearKey(),streak:S.correctStreak}); S.screen='feedback'; save();render()}
window.nextQ=function(){game.i++; if(game.i>=game.qs.length)finish(); else S.screen='game'; save();render()}
function finish(){const missed=game.answers.filter(a=>!a.ok); const perfect=game.correct===game.qs.length; const mult=game.mode==='boss'?2:1; game.score+=(250+(perfect?500:0))*mult; const tickets=1+(perfect?1:0)+(game.mode==='boss'?6:0); S.tickets+=tickets; S.streak+=1; if(perfect&&!S.badges.includes('Correct Choice'))S.badges.push('Correct Choice'); if(game.mode==='boss'&&!S.badges.includes('Final Rule Check Beater'))S.badges.push('Final Rule Check Beater'); if(S.streak>=7&&!S.badges.includes('Streak Engine'))S.badges.push('Streak Engine'); const sess={id:uid('s'),date:new Date().toLocaleDateString(),month:monthKey(),year:yearKey(),mode:game.mode,score:game.score,correct:game.correct,total:game.qs.length,tickets,section:S.settings.focusSection||'All'}; S.sessions.unshift(sess); S.answers.unshift(...game.answers); const t=currentTeam(); if(t){t.points=(t.points||0)+game.score;t.monthly=(t.monthly||0)+game.score;t.yearly=(t.yearly||0)+game.score} S.screen='results';save()}
window.createTeam=function(){const name=document.getElementById('newteam').value.trim(); if(!name)return; const id=uid('team'); S.teams.push({id,name,points:0,members:1,monthly:0,yearly:0});S.team=id;save();render()}
window.joinTeam=function(id){S.team=id;save();render()}
window.setFocus=function(){S.settings.focusSection=document.getElementById('focusSection').value;save();render()}
window.setRuleWeek=function(){S.settings.ruleOfWeekId=document.getElementById('ruleWeek').value;save();render()}
window.toggleTeams=function(){S.settings.teamsEnabled=!S.settings.teamsEnabled;save();render()}
window.setViewMode=function(mode){S.viewMode=mode;save();render()}
window.toggleSound=function(){S.settings.soundEnabled=!S.settings.soundEnabled;save();render(); if(S.settings.soundEnabled) sound('correct')}
window.grantBossStreak=function(){S.correctStreak=25;S.bestCorrectStreak=Math.max(S.bestCorrectStreak||0,25);save();render();toast('Final Rule Check unlocked for testing.')}
window.resetBossStreak=function(){S.correctStreak=0;save();render();toast('Boss streak reset.')}
window.openAdmin=function(){S.screen='admin';save();render()}
window.closeAdmin=function(){S.screen='home';S.tab='me';save();render()}
window.setBoardTab=function(tab){S.boardTab=tab;save();render()}

window.claimDailyBonus=function(){const tk=todayKey(); if(S.daily.lastBonusDate===tk){toast('Safe Day Bonus already claimed today.');return} S.daily.dayCount=(S.daily.dayCount||0)+1; const bonus=Math.min(7,S.daily.dayCount)*10; S.daily.lastBonusDate=tk; S.sessions.unshift({id:uid('bonus'),date:new Date().toLocaleDateString(),month:monthKey(),year:yearKey(),mode:'daily-bonus',score:bonus,correct:0,total:0,tickets:0,section:'Daily Bonus'}); toast('Safe Day Bonus claimed: +'+bonus+' points.'); save();render()}
window.setAvatar=function(id){const a=avatar(id); if(!canUseAvatar(a)){toast('Avatar locked. Earn '+a.points+' points to unlock it.');return} S.profile.avatarId=id; save();render();toast(a.name+' equipped.')}
window.searchProfiles=function(){render()}
window.invitePlayer=function(email){const p=S.players.find(x=>x.email===email); if(!p)return; if(S.invites.find(i=>i.email===email&&i.status==='pending')){toast('Invite already pending.');return} S.invites.unshift({id:uid('inv'),email:p.email,nick:p.nick,teamId:S.team,teamName:currentTeam()?.name||'Your Team',status:'pending',date:new Date().toLocaleDateString()}); toast('Invite sent to '+p.nick+'.'); save();render()}
window.acceptInvite=function(id){const inv=S.invites.find(i=>i.id===id); if(!inv)return; S.team=inv.teamId; inv.status='accepted'; save();render();toast('Joined '+inv.teamName+'.')}
window.declineInvite=function(id){const inv=S.invites.find(i=>i.id===id); if(inv)inv.status='declined'; save();render()}
window.updateProfileField=function(k,v){S.profile[k]=v; save();}


window.openRulesDrawer=function(){document.getElementById('drawerRoot').innerHTML=drawer()}
window.closeRulesDrawer=function(){document.getElementById('drawerRoot').innerHTML=''}
window.filterDrawer=function(){openRulesDrawer();setTimeout(()=>{const i=document.getElementById('drawerSearch'); if(i)i.focus()},0)}
window.openRule=function(id){S.tab='rules';S.screen='home';S.openRuleId=id;closeRulesDrawer();save();render()}
window.addRule=function(){const id=document.getElementById('ruleId').value.trim().toUpperCase()||uid('R'); const title=document.getElementById('ruleTitle').value.trim()||'Untitled Rule'; const section=document.getElementById('ruleSection').value.trim()||'General'; const text=document.getElementById('ruleText').value.trim()||'Rule text goes here.'; const ex=S.rules.find(r=>r.id===id); if(ex)Object.assign(ex,{title,section,text,active:true}); else S.rules.push({id,title,section,text,active:true}); S.settings.ruleOfWeekId=S.settings.ruleOfWeekId||id; save();render();toast('Rule saved.')}
window.removeRule=function(id){if(confirm('Remove/deactivate this rule?')){const r=S.rules.find(x=>x.id===id); if(r)r.active=false; save();render()}}
window.addQuestion=function(){const section=document.getElementById('qSection').value.trim()||'General'; const question=document.getElementById('qQuestion').value.trim(); if(!question){toast('Question text is required.');return} const choices=[0,1,2,3].map(i=>document.getElementById('qChoice'+i).value.trim()||('Choice '+(i+1))); const correct=Number(document.getElementById('qCorrect').value); const explanation=document.getElementById('qExp').value.trim()||'Review the related rule.'; const r=document.getElementById('qRule').value.trim()||S.rules[0]?.id||'RULE'; S.questions.push({id:uid('q'),rule:r,section,difficulty:'Custom',question,choices,correct,explanation,active:true}); save();render();toast('Question added.')}
window.removeQuestion=function(id){if(confirm('Remove/deactivate this question?')){const q=S.questions.find(x=>x.id===id); if(q)q.active=false; save();render()}}
window.addReward=function(){const title=document.getElementById('rwTitle').value.trim(); if(!title){toast('Reward title is required.');return} S.rewards.push({id:uid('rw'),period:document.getElementById('rwPeriod').value,title,desc:document.getElementById('rwDesc').value.trim(),active:true}); save();render();toast('Reward added.')}
window.toggleReward=function(id){const r=S.rewards.find(x=>x.id===id); if(r)r.active=!r.active; save();render()}
window.removeReward=function(id){if(confirm('Remove this reward?')){S.rewards=S.rewards.filter(r=>r.id!==id); save();render()}}
window.archiveMonth=function(){const w=monthlyWinners(); S.monthlyWinners.unshift({month:monthKey(),team:w.team.name,teamPoints:w.team.monthly||0,solo:w.solo.nick,soloPoints:w.solo.month||0}); S.teams.forEach(t=>t.monthly=0); S.players.forEach(p=>p.month=0); S.settings.lastMonthlyAlertMonth=monthKey(); save();render();toast('Monthly winners archived and monthly board reset.')}
function toast(t){const A=document.getElementById('app'); if(A)A.insertAdjacentHTML('afterbegin',`<div class="card notice">${esc(t)}</div>`)}
function drawer(){const q=(document.getElementById('drawerSearch')||{}).value||''; const sec=(document.getElementById('drawerSection')||{}).value||'All'; let rows=S.rules.filter(r=>r.active); if(sec!=='All')rows=rows.filter(r=>r.section===sec); if(q)rows=rows.filter(r=>(r.id+r.title+r.section+r.text).toLowerCase().includes(q.toLowerCase())); return `<div class="drawer-backdrop" onclick="closeRulesDrawer()"></div><aside class="drawer"><button class="btn tiny ghost drawer-close" onclick="closeRulesDrawer()">Close</button><h2>Quick Menu</h2><button class="btn full yellow" onclick="go('play');closeRulesDrawer()">Home</button><h2>Rule Search</h2><p class="small">Top-left dropdown reference menu.</p><input id="drawerSearch" class="input" placeholder="Search rules" value="${esc(q)}" oninput="filterDrawer()"><select id="drawerSection" class="select" onchange="filterDrawer()">${sections().map(s=>`<option ${s===sec?'selected':''}>${esc(s)}</option>`).join('')}</select>${rows.map(r=>`<button class="rule-link" onclick="openRule('${esc(r.id)}')"><b>${esc(r.id)} — ${esc(r.title)}</b><small>${esc(r.section)}</small></button>`).join('')||'<p class="small">No rules found.</p>'}</aside>`}
function loginView(){return `<section class="card hero"><div class="signal">🚦</div><div class="big">Locked Rail Yard</div><p class="sub">Only verified @conrail.com emails can enter.</p><input id="email" class="input" placeholder="name@conrail.com" inputmode="email"><button class="btn full" onclick="login()">Send Magic Link</button><button class="btn ghost full" style="margin-top:10px" onclick="demo()">Demo Unlock</button><p class="small">Prototype note: real launch needs backend domain enforcement.</p></section>`}
function profileView(){return `<section class="card"><h2>Build Your Crew Card</h2><div class="profile-card">${avatarHtml(S.profile?.avatarId||'orange-vest')}<div><b>Your starter avatar</b><br><span class="small">Earn points to unlock more avatars.</span></div></div><input id="nick" class="input" placeholder="Nickname" value="${esc(S.user.nick||'')}"><select id="craft" class="select">${['Conductor','Engineer','Yard','Mechanical','Track','Signal','Manager','Other'].map(c=>`<option ${S.profile?.craft===c?'selected':''}>${c}</option>`).join('')}</select><input id="hireYear" class="input" placeholder="Hire year, ex: 2020" value="${esc(S.profile?.hireYear||'')}"><select id="injuryMilestone" class="select">${['Prefer not to show','1+ year injury-free','3+ years injury-free','5+ years injury-free','10+ years injury-free'].map(c=>`<option ${S.profile?.injuryMilestone===c?'selected':''}>${c}</option>`).join('')}</select><input id="team" class="input" placeholder="Team / Terminal" value="${esc(currentTeam()?.name||'')}"><label class="small"><input type="checkbox" checked> I understand this app tracks game progress for safety learning rewards.</label><br><br><button class="btn full green" onclick="saveProfile()">Enter SafeTrack</button></section>`}
function home(){const row=rule(S.settings.ruleOfWeekId); const nxt=nextAvatar(); const dailyClaimed=S.daily?.lastBonusDate===todayKey();return `<div class="grid2"><section>${maybeAlertAdmin()}<div class="card hero"><div class="rail"></div><div class="big">Daily Track Check</div><p class="sub">Focus: <b>${esc(S.settings.focusSection||'All')}</b></p><button class="btn full yellow" onclick="startGame('daily')">🚂 Start Daily Track Check</button>${bossUnlocked()?`<button class="btn full green" style="margin-top:10px" onclick="startGame('boss')">🏁 Final Rule Check: Double Points</button>`:`<button class="btn full ghost" style="margin-top:10px" onclick="startGame('boss')">🔒 Final Rule Check Locked (${bossProgress()}/25)</button>`}<p class="small">Final Rule Check unlocks after 25 correct answers in a row and pays double points.</p></div><div class="card bonus"><h2>🎟 Safe Day Bonus</h2><p><b>Day ${Math.min(7,(S.daily?.dayCount||0)+1)}</b> reward: +${safeDayBonusValue()} points</p><button class="btn full ${dailyClaimed?'ghost':'green'}" onclick="claimDailyBonus()">${dailyClaimed?'Bonus Claimed Today':'Claim Today’s Bonus'}</button><p class="small">Bonus climbs each day up to Day 7, then stays capped to keep the board fair.</p></div><div class="card winner"><h2>⭐ Rule of the Week</h2><span class="tag yellow">${esc(row?.section)}</span><h3>${esc(row?.id)} — ${esc(row?.title)}</h3><p>${esc(row?.text)}</p><button class="btn ghost" onclick="openRule('${esc(row?.id)}')">Read Rule</button></div></section><section><div class="card"><div class="profile-card">${avatarHtml(S.profile?.avatarId||'orange-vest')}<div class="meta"><h2>${esc(S.user?.nick||'SafeTracker')}</h2><span class="tag">${esc(S.profile?.craft||'Craft')}</span><span class="tag yellow">${esc(currentTeam()?.name||'No Team')}</span><p class="small">${nxt?`Next avatar: ${esc(nxt.name)} at ${nxt.points} points`:'All listed avatars unlocked.'}</p></div></div></div><div class="card statgrid"><div class="stat"><span class="small">Level</span><br><b>${level()}</b></div><div class="stat"><span class="small">Year Points</span><br><b>${points()}</b></div><div class="stat"><span class="small">Month Points</span><br><b>${monthPoints()}</b></div><div class="stat"><span class="small">Tickets</span><br><b>${S.tickets}</b></div></div><div class="card"><h2>Current Rewards</h2>${activeRewards().slice(0,3).map(r=>`<div class="item reward"><b>${esc(r.period)}: ${esc(r.title)}</b><br><span class="small">${esc(r.desc)}</span></div>`).join('')||'<p class="small">No rewards posted yet.</p>'}</div>${nav('play')}</section></div>`}
function gameView(){const q=game.qs[game.i]; const pct=((game.i)/game.qs.length)*100;return `<section class="card"><div class="small">Question ${game.i+1} of ${game.qs.length} • ${esc(q.section)} • ${esc(q.rule)}</div><div class="bar"><span style="width:${pct+10}%"></span></div><div class="qbox">${esc(q.question)}</div>${q.choices.map((a,i)=>`<button class="choice" onclick="answer(${i})"><b>${'ABCD'[i]}.</b> ${esc(a)}</button>`).join('')}</section>`}
function feedback(){const last=game.answers.at(-1), q=game.qs.find(x=>x.id===last.qid);return `<section class="card center"><div class="signal">${last.ok?'✅':'🚧'}</div><div class="big">${last.ok?'Correct Choice!':'Red Signal!'}</div><p class="sub">${last.ok?'Safe choice locked in.':'Not quite. Let’s reroute.'}</p><div class="notice"><b>Correct:</b> ${esc(q.choices[q.correct])}<br>${esc(q.explanation)}<br><span class="tag">${esc(q.rule)}</span></div><br><button class="btn full" onclick="nextQ()">${game.i+1>=game.qs.length?'See Results':'Next Question'}</button></section>`}
function results(){const missed=game.answers.filter(a=>!a.ok).map(a=>a.rule);return `<section class="card center"><div class="signal">🏁</div><div class="big">${game.mode==='boss'?'Final Rule Check Complete!':'Sprint Complete!'}</div>${game.mode==='boss'?'<p class="sub">Double points applied.</p>':''}<div class="statgrid"><div class="stat"><span class="small">Score</span><br><b>${game.score}</b></div><div class="stat"><span class="small">Correct</span><br><b>${game.correct}/${game.qs.length}</b></div><div class="stat"><span class="small">Tickets</span><br><b>+${1+(game.correct===game.qs.length?1:0)+(game.mode==='boss'?6:0)}</b></div><div class="stat"><span class="small">Section</span><br><b>${esc(S.settings.focusSection||'All')}</b></div></div>${missed.length?`<div class="notice"><b>Review these rules:</b><br>${missed.map(r=>`<button class="btn tiny ghost" onclick="openRule('${esc(r)}')">${esc(r)}</button>`).join(' ')}</div>`:'<p class="sub">Perfect round. Correct Choice badge earned.</p>'}<button class="btn full yellow" onclick="startGame('daily')">Play Again</button>${nav('play')}</section>`}
function teams(){const team=currentTeam(); const members=[...S.players.filter(p=>p.team===team?.name),{nick:S.user?.nick||'You',email:S.user?.email||'',team:team?.name,month:monthPoints(),year:points(),craft:S.profile?.craft,avatarId:S.profile?.avatarId,badges:S.badges||[]}];return `<section class="card"><h2>Team Competition</h2><p class="sub">${S.settings.teamsEnabled?'Team play is enabled.':'Team play is currently disabled by admin.'}</p>${S.settings.teamsEnabled?`<div class="row"><input id="newteam" class="input" placeholder="Create team name"><button class="btn" onclick="createTeam()">Create</button></div><div class="list">${[...S.teams].sort((a,b)=>(b.monthly||0)-(a.monthly||0)).map((t,i)=>`<div class="item"><h3>${i+1}. ${esc(t.name)} ${S.team===t.id?'✅':''}</h3><span class="small">Monthly: ${t.monthly||0} • Yearly: ${t.yearly||0} • Members: ${t.members}</span><br><button class="btn ghost tiny" onclick="joinTeam('${t.id}')">Join Team</button></div>`).join('')}</div><h2>Team Profiles</h2><p class="sub">${esc(team?.name||'No Team')} member scores</p><div class="list">${members.map(m=>`<div class="profile-card">${avatarHtml(m.avatarId||'orange-vest')}<div class="meta"><b>${esc(m.nick)}</b><br><span class="small">${esc(m.craft||'Craft')} • Monthly ${m.month||0} • Yearly ${m.year||0}</span></div></div>`).join('')}</div>`:''}${nav('teams')}</section>`}
function crewProfiles(){const term=(document.getElementById('profileSearch')?.value||S.profileSearch||'').toLowerCase(); const me={nick:S.user?.nick||'You',email:S.user?.email||'',team:currentTeam()?.name||'No Team',month:monthPoints(),year:points(),craft:S.profile?.craft,hireYear:S.profile?.hireYear,badges:S.badges||[],avatarId:S.profile?.avatarId}; let people=[me,...S.players]; people=people.filter((p,i,a)=>a.findIndex(x=>(x.email||x.nick)===(p.email||p.nick))===i); if(term)people=people.filter(p=>[p.nick,p.email,p.team,p.craft].join(' ').toLowerCase().includes(term)); return `<section class="card"><h2>Crew Profiles</h2><p class="sub">Search employees, view avatars, and invite them to your team.</p><input id="profileSearch" class="input" placeholder="Search by nickname, craft, team" value="${esc(S.profileSearch||'')}" oninput="S.profileSearch=this.value;save();render()"><h3>Team Invites</h3>${S.invites.filter(i=>i.status==='pending').length?S.invites.filter(i=>i.status==='pending').map(i=>`<div class="item invite"><b>${esc(i.nick)}</b> invited to ${esc(i.teamName)}<br><span class="small">${esc(i.date)}</span><br>${i.email===S.user?.email?`<button class="btn tiny green" onclick="acceptInvite('${i.id}')">Accept</button> <button class="btn tiny red" onclick="declineInvite('${i.id}')">Decline</button>`:'<span class="tag yellow">Pending</span>'}</div>`).join(''):'<p class="small">No pending invites.</p>'}<div class="list">${people.map(p=>`<div class="profile-card">${avatarHtml(p.avatarId||'orange-vest')}<div class="meta"><h3>${esc(p.nick)}</h3><span class="tag">${esc(p.craft||'Craft')}</span><span class="tag yellow">${esc(p.team||'No Team')}</span><p class="small">${S.settings.profileVisibility?.scores!==false?`Monthly ${p.month||0} • Yearly ${p.year||0}`:''}${p.hireYear?' • Hire '+esc(p.hireYear):''}</p><p>${(p.badges||[]).slice(0,3).map(b=>`<span class="tag green">${esc(b)}</span>`).join('')}</p>${p.email!==S.user?.email?`<button class="btn tiny" onclick="invitePlayer('${esc(p.email)}')">Invite to Team</button>`:''}</div></div>`).join('')}</div>${nav('profiles')}</section>`}

function rules(){let rows=S.rules.filter(r=>r.active); const open=S.openRuleId?rule(S.openRuleId):null;return `<section class="card"><h2>Rules Dictionary</h2><p class="sub">Use the ☰ menu in the top-left for the dropdown search.</p>${open?`<div class="notice"><h3>${esc(open.id)} — ${esc(open.title)}</h3><span class="tag">${esc(open.section)}</span><p>${esc(open.text)}</p></div>`:''}<div class="list">${rows.map(r=>`<div class="item"><h3>${esc(r.id)} — ${esc(r.title)}</h3><span class="tag">${esc(r.section)}</span><p>${esc(r.text)}</p><button class="btn ghost tiny" onclick="openRule('${esc(r.id)}')">Open</button></div>`).join('')}</div>${nav('rules')}</section>`}
function board(){const tab=S.boardTab||'month'; const me={nick:S.user?.nick||'You',team:currentTeam()?.name||'No Team',month:monthPoints(),year:points()}; const solo=[...S.players,me].sort((a,b)=>(tab==='month'?b.month-a.month:b.year-a.year)); const teams=[...S.teams].sort((a,b)=>(tab==='month'?(b.monthly||0)-(a.monthly||0):(b.yearly||0)-(a.yearly||0)));return `<section class="card"><h2>Leaderboard</h2><div class="seg"><button class="${tab==='month'?'active':''}" onclick="setBoardTab('month')">Monthly</button><button class="${tab==='year'?'active':''}" onclick="setBoardTab('year')">Yearly</button><button class="${tab==='history'?'active':''}" onclick="setBoardTab('history')">Winners</button></div>${tab==='history'?`<h3>Month-to-Month Winners</h3><div class="list">${S.monthlyWinners.map(w=>`<div class="item winner"><b>${esc(w.month)}</b><br>Team: ${esc(w.team)} (${w.teamPoints})<br>Solo: ${esc(w.solo)} (${w.soloPoints})</div>`).join('')||'<p class="small">No archived winners yet. Admin can archive at month end.</p>'}</div>`:`<h3>${tab==='month'?'Monthly':'Yearly'} Individual</h3><div class="list">${solo.map((p,i)=>`<div class="item"><b>${i+1}. ${esc(p.nick)}</b><br><span class="small">${esc(p.team)} • ${tab==='month'?p.month:p.year} points</span></div>`).join('')}</div><h3>${tab==='month'?'Monthly':'Yearly'} Team</h3><div class="list">${teams.map((t,i)=>`<div class="item"><b>${i+1}. ${esc(t.name)}</b><br><span class="small">${tab==='month'?t.monthly:t.yearly} points</span></div>`).join('')}</div>`}${nav('board')}</section>`}
function rewards(){return `<section class="card"><h2>Rewards</h2><p class="sub">See what teams and solo players can win this month and year.</p><div class="list">${S.rewards.map(r=>`<div class="item reward"><h3>${esc(r.period)} — ${esc(r.title)} ${r.active?'':'(Hidden)'}</h3><p>${esc(r.desc)}</p></div>`).join('')||'<p class="small">No rewards posted.</p>'}</div>${nav('rewards')}</section>`}
function me(){const nxt=nextAvatar(); const grouped=AVATARS.reduce((m,a)=>{(m[a.tier]=m[a.tier]||[]).push(a);return m},{});return `<section class="card"><h2>My Profile</h2><div class="profile-card">${avatarHtml(S.profile?.avatarId||'orange-vest')}<div class="meta"><h2>${esc(S.user.nick||'SafeTracker')}</h2><span class="tag">${esc(S.profile?.craft||'Craft')}</span><span class="tag yellow">${esc(currentTeam()?.name||'No Team')}</span><p class="small">Hire: ${esc(S.profile?.hireYear||'Not set')} • ${esc(S.profile?.injuryMilestone||'')}</p></div></div><p><b>Email:</b> ${esc(S.user.email)}</p><p><b>Level:</b> ${level()}</p><p><b>Safe Days:</b> ${S.daily?.dayCount||0} • <b>Correct Streak:</b> ${S.correctStreak||0}/25</p><p><b>Badges:</b> ${S.badges.length?S.badges.map(b=>`<span class="tag">${esc(b)}</span>`).join(''):'No badges yet'}</p><h3>Avatar Unlocks</h3><p class="small">${nxt?`Next unlock: ${esc(nxt.name)} at ${nxt.points} points.`:'All listed avatars unlocked.'}</p><div class="unlock-grid">${Object.entries(grouped).map(([tier,list])=>`<div class="adminbox"><div class="tier-title">${esc(tier)}</div>${list.map(a=>`<div class="avatar-card ${S.profile?.avatarId===a.id?'selected':''}">${avatarHtml(a.id,canUseAvatar(a)?'':'locked')}<div><b>${esc(a.name)}</b><br><span class="small">${a.points} points ${canUseAvatar(a)?'• Unlocked':'• Locked'}</span><br><button class="btn tiny ${canUseAvatar(a)?'green':'ghost'}" onclick="setAvatar('${a.id}')">${S.profile?.avatarId===a.id?'Equipped':'Use Avatar'}</button></div></div>`).join('')}</div>`).join('')}</div><h3>Edit Profile</h3><div class="grid2"><input class="input" value="${esc(S.profile?.hireYear||'')}" onchange="updateProfileField('hireYear',this.value)" placeholder="Hire year"><select class="select" onchange="updateProfileField('craft',this.value)">${['Conductor','Engineer','Yard','Mechanical','Track','Signal','Manager','Other'].map(c=>`<option ${S.profile?.craft===c?'selected':''}>${c}</option>`).join('')}</select></div><h3>Device View</h3><div class="seg"><button class="${S.viewMode==='auto'?'active':''}" onclick="setViewMode('auto')">Auto</button><button class="${S.viewMode==='mobile'?'active':''}" onclick="setViewMode('mobile')">Mobile</button><button class="${S.viewMode==='desktop'?'active':''}" onclick="setViewMode('desktop')">Desktop</button></div><br>${S.user.role==='admin'?'<button class="btn ghost full" onclick="openAdmin()">Open Admin Dashboard</button>':''}<button class="btn red full" style="margin-top:10px" onclick="resetApp()">Reset Demo App</button>${nav('me')}</section>`}
function admin(){return `<section class="card"><h2>Manager Dashboard</h2><p class="sub">Admin controls for rules, questions, rewards, rule of the week, sound, and Final Rule Check testing.</p><div class="grid2"><div class="adminbox"><b>Team Competition</b><p class="small">Allow employees to create and join teams.</p><button class="btn ${S.settings.teamsEnabled?'red':'green'}" onclick="toggleTeams()">${S.settings.teamsEnabled?'Disable':'Enable'} Teams</button></div><div class="adminbox"><b>Question Focus Section</b><p class="small">Random Daily Track Check and Final Rule Check questions focus on this section.</p><select id="focusSection" class="select" onchange="setFocus()">${sections().map(s=>`<option ${S.settings.focusSection===s?'selected':''}>${esc(s)}</option>`).join('')}</select></div></div><div class="grid2"><div class="adminbox"><h3>Rule of the Week</h3><p class="small">This appears on the home page for all employees.</p><select id="ruleWeek" class="select" onchange="setRuleWeek()">${S.rules.filter(r=>r.active).map(r=>`<option value="${esc(r.id)}" ${S.settings.ruleOfWeekId===r.id?'selected':''}>${esc(r.id)} — ${esc(r.title)}</option>`).join('')}</select></div><div class="adminbox"><h3>Sound & Final Rule Check</h3><p><b>Sound:</b> ${S.settings.soundEnabled?'On':'Off'}</p><button class="btn ghost" onclick="toggleSound()">${S.settings.soundEnabled?'Turn Sound Off':'Turn Sound On'}</button><p class="small">Correct answers play a short train horn. Wrong answers play a buzzer.</p><p><b>Final Rule Check unlock streak:</b> ${S.correctStreak||0}/25</p><button class="btn green tiny" onclick="grantBossStreak()">Unlock Boss for Testing</button> <button class="btn red tiny" onclick="resetBossStreak()">Reset Boss Streak</button></div></div><div class="grid2"><div class="adminbox"><h3>Add / Update Rule</h3><input id="ruleId" class="input" placeholder="Rule ID, ex: OR-102"><input id="ruleTitle" class="input" placeholder="Rule title"><input id="ruleSection" class="input" placeholder="Section, ex: Operating Rules"><textarea id="ruleText" class="textarea" placeholder="Rule text"></textarea><button class="btn full green" onclick="addRule()">Save Rule</button><h4>Active Rules</h4><div class="list">${S.rules.filter(r=>r.active).map(r=>`<div class="item"><b>${esc(r.id)}</b> ${esc(r.title)}<br><span class="small">${esc(r.section)}</span><br><button class="btn tiny red" onclick="removeRule('${esc(r.id)}')">Remove Rule</button></div>`).join('')}</div></div><div class="adminbox"><h3>Add Question</h3><input id="qQuestion" class="input" placeholder="Question text"><input id="qSection" class="input" placeholder="Section"><input id="qRule" class="input" placeholder="Related Rule ID"><input id="qChoice0" class="input" placeholder="Choice A"><input id="qChoice1" class="input" placeholder="Choice B"><input id="qChoice2" class="input" placeholder="Choice C"><input id="qChoice3" class="input" placeholder="Choice D"><select id="qCorrect" class="select"><option value="0">A is correct</option><option value="1">B is correct</option><option value="2">C is correct</option><option value="3">D is correct</option></select><textarea id="qExp" class="textarea" placeholder="Short explanation"></textarea><button class="btn full green" onclick="addQuestion()">Add Question</button><h4>Active Questions</h4><div class="list">${S.questions.filter(q=>q.active).map(q=>`<div class="item"><b>${esc(q.section)}</b><br>${esc(q.question)}<br><span class="small">Rule: ${esc(q.rule)}</span><br><button class="btn tiny red" onclick="removeQuestion('${esc(q.id)}')">Remove Question</button></div>`).join('')}</div></div></div><div class="adminbox"><h3>Rewards / Prizes</h3><input id="rwTitle" class="input" placeholder="Prize title"><select id="rwPeriod" class="select"><option>Monthly</option><option>Yearly</option></select><textarea id="rwDesc" class="textarea" placeholder="Prize description"></textarea><button class="btn full green" onclick="addReward()">Add Reward</button><div class="list">${S.rewards.map(r=>`<div class="item reward"><b>${esc(r.period)}: ${esc(r.title)}</b><p>${esc(r.desc)}</p><button class="btn tiny ghost" onclick="toggleReward('${r.id}')">${r.active?'Hide':'Show'}</button> <button class="btn tiny red" onclick="removeReward('${r.id}')">Remove Reward</button></div>`).join('')}</div></div><div class="adminbox"><h3>Month-End Controls</h3><p class="small">Archive monthly winners, reset monthly team/player scores, and keep yearly scores.</p><button class="btn full yellow" onclick="archiveMonth()">Archive Month & Reset Monthly Board</button></div><button class="btn full" onclick="closeAdmin()">Back to Profile</button></section>`}
function render(){applyViewMode(); const A=document.getElementById('app'); if(!S.user)A.innerHTML=loginView(); else if(S.screen==='profile')A.innerHTML=profileView(); else if(S.screen==='game')A.innerHTML=gameView(); else if(S.screen==='feedback')A.innerHTML=feedback(); else if(S.screen==='results')A.innerHTML=results(); else if(S.screen==='admin')A.innerHTML=admin(); else if(S.tab==='teams')A.innerHTML=teams(); else if(S.tab==='profiles')A.innerHTML=crewProfiles(); else if(S.tab==='rules')A.innerHTML=rules(); else if(S.tab==='board')A.innerHTML=board(); else if(S.tab==='rewards')A.innerHTML=rewards(); else if(S.tab==='me')A.innerHTML=me(); else A.innerHTML=home()}
window.render=render;
window.addEventListener('error',e=>{document.getElementById('app').innerHTML='<section class="card"><h2>App Error</h2><p>'+esc(e.message)+'</p><button class="btn" onclick="resetApp()">Reset</button></section>'});
if(new URLSearchParams(location.search).has('reset')){localStorage.removeItem(LS);S=structuredClone(seed);history.replaceState(null,'',location.pathname)}
applyViewMode(); render();
})();
</script></body></html>
