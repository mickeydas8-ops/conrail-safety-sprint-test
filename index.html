der-radius:12px;padding:12px;margin:10px 0}.meta{flex:1}.drawer-backdrop{position:fixed;inset:0;background:#0008;z-index:10}.drawer{position:fixed;left:0;top:0;bottom:0;width:min(410px,92vw);background:#081423;border-right:1px solid var(--line);z-index:11;padding:18px;overflow:auto}.rule-link{display:block;width:100%;border:1px solid var(--line);background:#0d1d31;color:var(--text);padding:12px;border-radius:10px;text-align:left;margin:8px 0}.mobile-shell{grid-template-columns:1fr;grid-template-rows:auto auto 1fr}.mobile-shell .brand{grid-column:1;grid-template-columns:1fr}.mobile-shell .right{display:none}.mobile-shell .rail-banner{display:flex;height:170px;border-left:0;border-right:0}.mobile-shell .side{display:flex;overflow:auto;position:sticky;top:0;z-index:5;padding:6px;border-right:0;border-bottom:1px solid var(--line)}.mobile-shell .navbtn{min-width:116px;justify-content:center;flex-direction:column;gap:4px;font-size:11px}.mobile-shell .main{padding:12px}.mobile-shell .grid2,.mobile-shell .grid3,.mobile-shell .dash-top,.mobile-shell .rule-week,.mobile-shell .announcement-grid{grid-template-columns:1fr}.mobile-shell .brand-left{padding:12px}.mobile-shell .brand h1{font-size:24px}@media(max-width:1050px){.app{grid-template-columns:1fr;grid-template-rows:auto auto 1fr}.brand{grid-column:1;grid-template-columns:1fr}.right{display:none}.rail-banner{display:flex;height:170px;border-left:0;border-right:0}.side{display:flex;overflow:auto;position:sticky;top:0;z-index:5;padding:6px;border-right:0;border-bottom:1px solid var(--line)}.navbtn{min-width:116px;justify-content:center;flex-direction:column;gap:4px;font-size:11px}.main{padding:12px}.grid2,.grid3,.dash-top,.rule-week,.announcement-grid{grid-template-columns:1fr}.brand h1{font-size:24px}.brand-left{padding:12px}}

<script>

const A=[
{id:'rulebook',name:'Rule Book',icon:'📘',points:0,tier:'0 Points - Starter'},{id:'orangevest',name:'Orange Safety Vest',icon:'🦺',points:0,tier:'0 Points - Starter'},{id:'hardhat',name:'Basic Hard Hat',icon:'⛑️',points:0,tier:'0 Points - Starter'},
{id:'lantern',name:'Lantern',icon:'🏮',points:500,tier:'500 Points - Rookie'},{id:'wrench',name:'Track Wrench',icon:'🔧',points:500,tier:'500 Points - Rookie'},{id:'brake',name:'Brake Wheel',icon:'⚙️',points:500,tier:'500 Points - Rookie'},
{id:'goldhat',name:'Hard Hat Pro',icon:'🪖',points:1500,tier:'1500 Points - Skilled'},{id:'radio',name:'Radio Ready',icon:'📟',points:1500,tier:'1500 Points - Skilled'},{id:'trackbadge',name:'Track Badge',icon:'🛡️',points:1500,tier:'1500 Points - Skilled'},
{id:'loco',name:'Locomotive Badge',icon:'🚂',points:3000,tier:'3000 Points - Advanced'},{id:'crewshield',name:'Crew Shield',icon:'🛡️',points:3000,tier:'3000 Points - Advanced'},{id:'hawk',name:'Yard Hawk',icon:'🦅',points:3000,tier:'3000 Points - Advanced'},
{id:'goldhardhat',name:'Gold Hard Hat',icon:'👷',points:5000,tier:'5000 Points - Expert'},{id:'rulemaster',name:'Rule Master',icon:'📖',points:5000,tier:'5000 Points - Expert'},{id:'trackwise',name:'TrackWise Badge',icon:'🛠️',points:5000,tier:'5000 Points - Expert'},
{id:'champion',name:'SafeTrack Champion',icon:'🏅',points:10000,tier:'10000 Points - Elite'},{id:'captain',name:'Crew Captain',icon:'🎖️',points:10000,tier:'10000 Points - Elite'},{id:'steel',name:'Steel Shield',icon:'🛡️',points:10000,tier:'10000 Points - Elite'},
{id:'legend',name:'Yard Legend',icon:'🌆',points:25000,tier:'25000 Points - Legend'},{id:'masterconductor',name:'Master Conductor',icon:'🎩',points:25000,tier:'25000 Points - Legend'},{id:'ironrule',name:'Iron Rule Badge',icon:'🏆',points:25000,tier:'25000 Points - Legend'},{id:'yellowvest',name:'Yellow Reflective Vest',icon:'🦺',points:25000,tier:'25000 Points - Legend / Promoted Conductor'}
];
const seed={user:null,screen:'login',nav:'dashboard',boardTab:'month',questionIndex:0,score:0,lastAnswer:null,viewMode:'auto',settings:{teamsEnabled:true,focusSection:'All',ruleOfWeekId:'OR-101',sound:true},profile:{nick:'Big Mike',craft:'Conductor',hireYear:'2017',team:'north',avatar:'orangevest',injury:'Milestone hidden'},daily:{last:null,count:7,claimed:false},points:1860,monthly:1860,yearly:12840,correctStreak:18,tickets:9,badges:['Rule Ready','Radio Ready','Track Badge','Crew Contributor'],teamInvites:[],rules:[
{id:'OR-101',section:'Radio Communication',title:'Clear Radio Communication',text:'Always communicate clear and concise information. Use proper radio procedures and repeat critical messages when required.',active:true},
{id:'YS-204',section:'Yard Safety',title:'Stop and Verify Conflicting Instructions',text:'When instructions conflict or are unclear, stop and verify before continuing.',active:true},
{id:'PPE-110',section:'PPE',title:'Required PPE',text:'Wear required PPE before entering designated work areas.',active:true},
{id:'ER-301',section:'Emergency Response',title:'Report Hazards Promptly',text:'Report unsafe conditions through the proper channel as soon as practical.',active:true}
],questions:[
{id:'q1',section:'Radio Communication',rule:'OR-101',q:'You receive unclear radio instructions. What is the safest action?',c:['Guess the intended move','Stop and request clarification','Continue slowly','Ask after the move'],a:1,exp:'Stop and clarify unclear radio instructions before continuing.',active:true},
{id:'q2',section:'Yard Safety',rule:'YS-204',q:'Two instructions conflict before a move. What should happen first?',c:['Proceed if the track looks clear','Stop and verify','Let the crew decide later','Use the older instruction'],a:1,exp:'Conflicting instructions must be clarified before continuing.',active:true},
{id:'q3',section:'PPE',rule:'PPE-110',q:'You are entering a required PPE area. What comes first?',c:['Enter quickly','Ask someone later','Wear the required PPE','Only use gloves'],a:2,exp:'Required PPE must be worn before entering the area.',active:true},
{id:'q4',section:'Emergency Response',rule:'ER-301',q:'You notice a new hazard in the work area. What should you do?',c:['Ignore it if work is busy','Report it through the proper channel','Wait until month end','Tell only a coworker'],a:1,exp:'Unsafe conditions should be reported promptly.',active:true}
],teams:[
{id:'north',name:'North Jersey Crew',monthly:18600,yearly:84400,members:['Big Mike','RadioReadyRob','TrackStar','RuleRita','BrakeCheckBen']},
{id:'south',name:'South Jersey Crew',monthly:17450,yearly:80100,members:['YardHawk','SwitchSam','LanternLou','IronHorse']},
{id:'central',name:'Central Crew',monthly:16200,yearly:76200,members:['RailBoss','SafeMoveSue','ConductorCal']}
],employees:[
{id:'e1',nick:'Big Mike',craft:'Conductor',team:'North Jersey Crew',monthly:1860,yearly:12840,avatar:'orangevest',badges:['Rule Ready','Radio Ready']},
{id:'e2',nick:'YardHawk',craft:'Engineer',team:'South Jersey Crew',monthly:2450,yearly:15100,avatar:'hawk',badges:['Yard Hawk']},
{id:'e3',nick:'RailBoss',craft:'Manager',team:'Central Crew',monthly:1620,yearly:12900,avatar:'captain',badges:['Crew Captain']},
{id:'e4',nick:'TrackStar',craft:'Conductor',team:'North Jersey Crew',monthly:1380,yearly:11820,avatar:'trackbadge',badges:['Track Badge']},
{id:'e5',nick:'IronHorse',craft:'Engineer',team:'South Jersey Crew',monthly:1250,yearly:10950,avatar:'ironrule',badges:['Rule Ready']},
{id:'e6',nick:'RadioReadyRob',craft:'Yard',team:'North Jersey Crew',monthly:1120,yearly:9870,avatar:'radio',badges:['Radio Ready']}
],rewards:[
{id:'r1',period:'Monthly',title:'Top Team Lunch',desc:'Winning team earns lunch recognition.',active:true},
{id:'r2',period:'Monthly',title:'Participation Raffle',desc:'Daily Check completions earn raffle tickets.',active:true},
{id:'r3',period:'Yearly',title:'SafeTrack Champion Recognition',desc:'Top yearly score earns annual recognition.',active:true}
],winners:[
{month:'2026-05',team:'North Jersey Crew',teamPoints:24600,solo:'Big Mike',soloPoints:8200},
{month:'2026-04',team:'South Jersey Crew',teamPoints:22100,solo:'TrackBoss92',soloPoints:7450},
{month:'2026-03',team:'Detroit Yard Hawks',teamPoints:19900,solo:'BrakeCheckBen',soloPoints:6900}
]};
let S=load();
function load(){try{return JSON.parse(localStorage.getItem(LS))||structuredClone(seed)}catch(e){return structuredClone(seed)}}
function save(){localStorage.setItem(LS,JSON.stringify(S))}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function avatar(id,cls=''){const a=A.find(x=>x.id===id)||A[1];return `<div class="avatar ${cls}">${a.icon}</div>`}
function pts(){return S.points||0}
function can(a){return pts()>=a.points || (a.id==='yellowvest'&&S.profile.craft==='Promoted Conductor')}
function currentRule(){return S.rules.find(r=>r.id===S.settings.ruleOfWeekId)||S.rules[0]}
function byScore(arr,k){return [...arr].sort((a,b)=>(b[k]||0)-(a[k]||0))}
function top5(){return byScore(S.employees,'monthly').slice(0,5)}
function navItems(){return [['dashboard','🏠','Dashboard'],['daily','☑️','Daily Check'],['rules','📖','Rule Book'],['board','🏆','Leaderboard'],['rewards','🎁','Rewards'],['profiles','👥','Employee Profiles'],['teams','🛡️','Teams'],['me','👤','My Profile'],['admin','⚙️','Control Tower']]} 
function shell(content){const mobile=S.viewMode==='mobile';return `<div class="app ${mobile?'mobile-shell':''}"><header class="brand"><div class="brand-left"><img class="app-icon" src="safetrack-yellow-192-v150.png?v=150"><div><h1>Safe<span class="yellow">Track</span></h1><div class="tagline">Make the <b>safe</b> move,<br>not the <b>fast</b> move.</div></div></div><div class="rail-banner"><div class="train"></div><div class="banner-text">Daily checks, rule review, crew scores, and monthly rewards in one professional dashboard.</div></div><div class="profile-top"><button class="btn ghost" onclick="openDrawer()">Search Rules</button><div class="mini"><b>${esc(S.profile.nick)}</b><br><span class="muted">${esc(S.profile.craft)} - ${teamName()}</span></div></div></header><aside class="side">${navItems().map(n=>`<button class="navbtn ${S.nav===n[0]?'active':''}" onclick="go('${n[0]}')"><span class="nav-icon">${n[1]}</span>${n[2]}</button>`).join('')}</aside><main class="main">${content}</main><aside class="right">${rightPanel()}</aside></div><div id="drawerRoot"></div>`}
function rightPanel(){return `<section class="card"><h3>My Profile <button class="btn tiny ghost" style="float:right" onclick="go('me')">View</button></h3><div class="profile-card">${avatar(S.profile.avatar,'large')}<div><h2>${esc(S.profile.nick)}</h2><div>${esc(S.profile.craft)}</div><div class="yellow">${esc(teamName())}</div><p>Hire Year: ${esc(S.profile.hireYear)}</p></div></div><div class="grid2"><div><span class="muted">This Month</span><h2>${S.monthly}</h2></div><div><span class="muted">Safe Days</span><h2 class="yellow">${S.daily.count}</h2></div></div><h3>Badges</h3><div class="badge-row">${S.badges.slice(0,4).map(b=>`<div class="badge">🏅<small>${esc(b)}</small></div>`).join('')}</div></section><section class="card"><h3>Top 5 - This Month</h3>${top5().map((p,i)=>`<div class="leader-item ${p.nick===S.profile.nick?'you':''}"><b>${i+1}</b>${avatar(p.avatar,'small')}<div><b>${esc(p.nick)}</b><br><span class="muted">${esc(p.team)}</span></div><b>${p.monthly}</b></div>`).join('')}<p class="muted" style="text-align:center">Scores update nightly</p></section>`}
function login(){return `<div class="login"><section class="login-card"><img class="app-icon" src="safetrack-yellow-192-v150.png?v=150"><h1>Safe<span class="yellow">Track</span></h1><p class="tagline">Make the <b>safe</b> move, not the <b>fast</b> move.</p><p class="muted">Conrail-only prototype access.</p><input id="email" class="input" placeholder="name@conrail.com" value="demo.manager@conrail.com"><button class="btn primary full" onclick="login()">Demo Unlock</button><p id="loginMsg" class="muted"></p></section></div>`}
function dashboard(){const r=currentRule();return shell(`<section class="card"><div class="row"><div><h2>Daily Check</h2><p class="muted">3 questions. 1 rule reminder. Help your crew.</p></div><button class="btn primary" onclick="startDaily()">Start Daily Check</button></div><div class="dash-top"><div class="stat"><h3>Daily Check-In Streak</h3><div class="big">${S.daily.count}</div><b>Days</b><p class="muted">Keep it going.</p></div><div class="stat"><h3>Today's Check-In Bonus</h3><p>Day ${Math.min(S.daily.count+1,7)} of 7</p><div class="big" style="color:var(--green)">+${Math.min(S.daily.count+1,7)*10}</div><b>Points</b><p class="muted">Bonus resets weekly.</p></div><div class="stat"><h3>Your Monthly Progress</h3><div class="progress-ring"><span>${S.monthly}</span></div><p class="muted">Next milestone: ${Math.ceil((S.monthly+1)/1000)*1000} pts</p></div></div></section><section class="card rule-week"><div><h2>Rule of the Week</h2><h3 class="yellow">${esc(r.id)} - ${esc(r.title)}</h3><p>${esc(r.text)}</p><button class="btn" onclick="go('rules')">View Full Rule</button></div><div class="rule-photo"></div></section><section class="card"><h2>Announcements</h2><div class="announcement-grid"><div class="stat"><h3>🏆 ${esc(S.teams[0].name)} leads Monthly Crew Cup</h3><p>Great job leading the way.</p><button class="btn" onclick="go('board')">View Leaderboard</button></div><div class="stat"><h3>📅 Monthly Rewards</h3><p>Rewards end in 9 days. Keep earning points to qualify.</p><button class="btn" onclick="go('rewards')">View Rewards</button></div></div></section><div class="grid3"><div class="stat"><b>128</b><br><span class="muted">Employees</span></div><div class="stat"><b>12</b><br><span class="muted">Active Teams</span></div><div class="stat"><b>92%</b><br><span class="muted">Participation Rate</span></div></div>`)}
function daily(){return shell(`<section class="card"><h2>Daily Check</h2><p class="muted">Complete today's short check. Correct answers build your safety score and team score.</p><button class="btn primary full" onclick="startDaily()">Begin 3-Question Check</button></section><section class="card"><h3>Final Rule Check</h3><p>Unlock progress: <b>${S.correctStreak}/25</b> correct choices this month.</p><p class="muted">Final Rule Check is worth double points after unlocking.</p><button class="btn ${S.correctStreak>=25?'primary':'ghost'} full" ${S.correctStreak>=25?'onclick="startBoss()"':'disabled'}>Start Final Rule Check</button></section>`)}
function play(mode){const qs=activeQuestions().slice(0,mode==='boss'?5:3);const q=qs[S.questionIndex%qs.length];return shell(`<section class="card"><h2>${mode==='boss'?'Final Rule Check':'Daily Check'}</h2><p class="muted">Question ${S.questionIndex+1} of ${qs.length}</p><div class="qbox">${esc(q.q)}</div>${q.c.map((c,i)=>`<button class="choice" onclick="answer(${i})"><b>${String.fromCharCode(65+i)}.</b> ${esc(c)}</button>`).join('')}</section>`)}
function feedback(){const la=S.lastAnswer||{};return shell(`<section class="card"><h2>${la.ok?'Safe Choice Confirmed':'Stop and Review'}</h2><div class="qbox">${la.ok?'✅':'⚠️'}</div><p>${esc(la.exp)}</p><p class="muted">Related rule: ${esc(la.rule)}</p><button class="btn primary full" onclick="nextQuestion()">Continue</button><button class="btn ghost full" style="margin-top:10px" onclick="go('rules')">Read Related Rule</button></section>`)}
function results(){return shell(`<section class="card"><h2>Check Complete</h2><div class="grid3"><div class="stat"><b>${S.score}</b><br><span class="muted">Points</span></div><div class="stat"><b>${S.correctStreak}</b><br><span class="muted">Correct Streak</span></div><div class="stat"><b>${S.tickets}</b><br><span class="muted">Tickets</span></div></div><button class="btn primary full" onclick="go('dashboard')">Back to Dashboard</button></section>`)}
function rules(){return shell(`<section class="card"><h2>Rule Book</h2><input class="input" id="ruleSearch" placeholder="Search rules" oninput="renderRules()"><div id="ruleList">${ruleListHtml('')}</div></section>`)}
function ruleListHtml(term){term=(term||'').toLowerCase();return S.rules.filter(r=>r.active&&(`${r.id} ${r.section} ${r.title} ${r.text}`.toLowerCase().includes(term))).map(r=>`<div class="item"><span class="pill yellow">${esc(r.section)}</span><h3>${esc(r.id)} - ${esc(r.title)}</h3><p>${esc(r.text)}</p></div>`).join('')||'<p class="muted">No matching rules.</p>'}
function board(){const solo=byScore(S.employees,S.boardTab==='year'?'yearly':'monthly');const teams=byScore(S.teams,S.boardTab==='year'?'yearly':'monthly');return shell(`<section class="card"><h2>Leaderboard</h2><div class="seg"><button class="${S.boardTab==='month'?'active':''}" onclick="boardTab('month')">Monthly</button><button class="${S.boardTab==='year'?'active':''}" onclick="boardTab('year')">Yearly</button><button class="${S.boardTab==='winners'?'active':''}" onclick="boardTab('winners')">Winners Circle</button></div>${S.boardTab==='winners'?`<div class="list">${S.winners.map(w=>`<div class="item"><h3>${esc(w.month)}</h3><p>Top Team: <b>${esc(w.team)}</b> (${w.teamPoints})</p><p>Top Individual: <b>${esc(w.solo)}</b> (${w.soloPoints})</p></div>`).join('')}</div>`:`<div class="grid2"><div><h3>Individuals</h3>${solo.map((p,i)=>`<div class="leader-item"><b>${i+1}</b>${avatar(p.avatar,'small')}<div><b>${esc(p.nick)}</b><br><span class="muted">${esc(p.team)}</span></div><b>${S.boardTab==='year'?p.yearly:p.monthly}</b></div>`).join('')}</div><div><h3>Teams</h3>${teams.map((t,i)=>`<div class="leader-item"><b>${i+1}</b><span class="avatar small">🛡️</span><div><b>${esc(t.name)}</b><br><span class="muted">${t.members.length} members</span></div><b>${S.boardTab==='year'?t.yearly:t.monthly}</b></div>`).join('')}</div></div>`}</section>`)}
function rewards(){return shell(`<section class="card"><h2>Rewards</h2><div class="grid2">${S.rewards.filter(r=>r.active).map(r=>`<div class="stat"><h3>${esc(r.period)} - ${esc(r.title)}</h3><p>${esc(r.desc)}</p></div>`).join('')}</div></section>`)}
function profiles(){return shell(`<section class="card"><h2>Employee Profiles</h2><input class="input" id="empSearch" placeholder="Search employees" oninput="renderProfiles()"><div id="empList">${profilesHtml('')}</div></section>`)}
function profilesHtml(term){term=(term||'').toLowerCase();return S.employees.filter(p=>`${p.nick} ${p.craft} ${p.team}`.toLowerCase().includes(term)).map(p=>`<div class="profile-card">${avatar(p.avatar)}<div class="meta"><h3>${esc(p.nick)}</h3><span class="pill">${esc(p.craft)}</span> <span class="pill yellow">${esc(p.team)}</span><p class="muted">Monthly ${p.monthly} - Yearly ${p.yearly}</p></div><button class="btn tiny" onclick="invite('${p.id}')">Invite</button></div>`).join('')||'<p class="muted">No profiles found.</p>'}
function teams(){const t=S.teams.find(x=>x.id===S.profile.team)||S.teams[0];const members=S.employees.filter(e=>e.team===t.name);return shell(`<section class="card"><h2>Team Profiles</h2><h3>${esc(t.name)}</h3><div class="grid3"><div class="stat"><b>${t.monthly}</b><br><span class="muted">Monthly</span></div><div class="stat"><b>${t.yearly}</b><br><span class="muted">Yearly</span></div><div class="stat"><b>${members.length}</b><br><span class="muted">Members</span></div></div><h3>Members</h3>${members.map(m=>`<div class="leader-item">${avatar(m.avatar,'small')}<div style="grid-column:span 2"><b>${esc(m.nick)}</b><br><span class="muted">${esc(m.craft)}</span></div><b>${m.monthly}</b></div>`).join('')}<h3>Team Invites</h3>${S.teamInvites.length?S.teamInvites.map(i=>`<div class="item">Invite sent to ${esc(i)}</div>`).join(''):'<p class="muted">No pending invites.</p>'}</section>`)}
function me(){const grouped=A.reduce((m,a)=>(m[a.tier]=(m[a.tier]||[]),m[a.tier].push(a),m),{});return shell(`<section class="card"><h2>My Profile</h2><div class="profile-card">${avatar(S.profile.avatar,'large')}<div><h2>${esc(S.profile.nick)}</h2><p>${esc(S.profile.craft)} - ${esc(teamName())}</p><p>Hire Year: ${esc(S.profile.hireYear)}</p></div></div><div class="grid3"><div class="stat"><b>${S.points}</b><br><span class="muted">Total Points</span></div><div class="stat"><b>${S.daily.count}</b><br><span class="muted">Safe Days</span></div><div class="stat"><b>${S.badges.length}</b><br><span class="muted">Badges</span></div></div><h3>Profile Emblems</h3>${Object.entries(grouped).map(([tier,list])=>`<div class="card"><h3>${esc(tier)}</h3>${list.map(a=>`<div class="profile-card">${avatar(a.id,can(a)?'':'locked')}<div class="meta"><b>${esc(a.name)}</b><br><span class="muted">${a.points} points ${can(a)?'- Unlocked':'- Locked'}</span></div><button class="btn tiny ${can(a)?'primary':'ghost'}" ${can(a)?`onclick="setAvatar('${a.id}')"`:'disabled'}>${S.profile.avatar===a.id?'Equipped':'Use'}</button></div>`).join('')}</div>`).join('')}<h3>Settings</h3><div class="grid2"><select class="select" onchange="profileField('craft',this.value)">${['Conductor','Promoted Conductor','Engineer','Yard','Mechanical','Track','Signal','Manager','Other'].map(x=>`<option ${S.profile.craft===x?'selected':''}>${x}</option>`).join('')}</select><input class="input" value="${esc(S.profile.hireYear)}" onchange="profileField('hireYear',this.value)" placeholder="Hire year"></div><div class="seg"><button class="${S.viewMode==='auto'?'active':''}" onclick="viewMode('auto')">Auto</button><button class="${S.viewMode==='mobile'?'active':''}" onclick="viewMode('mobile')">Mobile</button><button class="${S.viewMode==='desktop'?'active':''}" onclick="viewMode('desktop')">Desktop</button></div></section>`)}
function admin(){return shell(`<section class="card"><h2>Control Tower</h2><div class="grid2"><div class="stat"><h3>Rule of the Week</h3><select class="select" id="rwk" onchange="setRuleWeek()">${S.rules.filter(r=>r.active).map(r=>`<option value="${esc(r.id)}" ${S.settings.ruleOfWeekId===r.id?'selected':''}>${esc(r.id)} - ${esc(r.title)}</option>`).join('')}</select></div><div class="stat"><h3>Sound</h3><p>${S.settings.sound?'Railroad sounds on':'Sounds off'}</p><button class="btn" onclick="toggleSound()">Toggle Sound</button><p class="muted">Correct: clean ding. Wrong: short buzzer.</p></div></div><div class="grid2"><div class="card"><h3>Add / Remove Rules</h3><input id="rid" class="input" placeholder="Rule ID"><input id="rsec" class="input" placeholder="Section"><input id="rtitle" class="input" placeholder="Title"><textarea id="rtext" class="textarea" placeholder="Rule text"></textarea><button class="btn primary full" onclick="addRule()">Save Rule</button>${S.rules.filter(r=>r.active).map(r=>`<div class="item"><b>${esc(r.id)}</b> ${esc(r.title)}<br><button class="btn tiny red" onclick="removeRule('${r.id}')">Remove</button></div>`).join('')}</div><div class="card"><h3>Add / Remove Questions</h3><input id="qq" class="input" placeholder="Question"><input id="qsec" class="input" placeholder="Section"><input id="qrule" class="input" placeholder="Rule ID"><input id="c0" class="input" placeholder="Choice A"><input id="c1" class="input" placeholder="Choice B"><input id="c2" class="input" placeholder="Choice C"><input id="c3" class="input" placeholder="Choice D"><select id="qa" class="select"><option value="0">A correct</option><option value="1">B correct</option><option value="2">C correct</option><option value="3">D correct</option></select><textarea id="qexp" class="textarea" placeholder="Explanation"></textarea><button class="btn primary full" onclick="addQuestion()">Add Question</button>${S.questions.filter(q=>q.active).map(q=>`<div class="item"><b>${esc(q.section)}</b><br>${esc(q.q)}<br><button class="btn tiny red" onclick="removeQuestion('${q.id}')">Remove</button></div>`).join('')}</div></div><div class="card"><h3>Rewards / Prizes</h3><input id="rt" class="input" placeholder="Reward title"><select id="rp" class="select"><option>Monthly</option><option>Yearly</option></select><textarea id="rd" class="textarea" placeholder="Description"></textarea><button class="btn primary full" onclick="addReward()">Add Reward</button>${S.rewards.map(r=>`<div class="item"><b>${esc(r.period)} - ${esc(r.title)}</b><p>${esc(r.desc)}</p><button class="btn tiny" onclick="toggleReward('${r.id}')">${r.active?'Hide':'Show'}</button> <button class="btn tiny red" onclick="removeReward('${r.id}')">Remove</button></div>`).join('')}</div><button class="btn primary" onclick="archiveMonth()">Archive Month and Reset Monthly Board</button></section>`)}
function activeQuestions(){let q=S.questions.filter(x=>x.active);if(S.settings.focusSection!=='All')q=q.filter(x=>x.section===S.settings.focusSection);return q.length?q:S.questions.filter(x=>x.active)}
function teamName(){return (S.teams.find(t=>t.id===S.profile.team)||S.teams[0]).name}
function render(){const root=document.getElementById('root'); if(!S.user){root.innerHTML=login();return} if(S.screen==='game'){root.innerHTML=play(S.mode);return} if(S.screen==='feedback'){root.innerHTML=feedback();return} if(S.screen==='results'){root.innerHTML=results();return} const views={dashboard,daily,rules,board,rewards,profiles,teams,me,admin}; root.innerHTML=(views[S.nav]||dashboard)()}
function go(n){S.screen='main';S.nav=n;save();render()} window.go=go;
window.login=function(){const e=document.getElementById('email').value.trim().toLowerCase();if(!e.endsWith('@conrail.com')){document.getElementById('loginMsg').textContent='Use an @conrail.com email.';return}S.user={email:e,role:'admin'};save();render()}
window.startDaily=function(){claimBonus();S.mode='daily';S.screen='game';S.questionIndex=0;S.score=0;save();render()}
window.startBoss=function(){S.mode='boss';S.screen='game';S.questionIndex=0;S.score=0;save();render()}
window.answer=function(i){const qs=activeQuestions().slice(0,S.mode==='boss'?5:3);const q=qs[S.questionIndex%qs.length];const ok=i===q.a;playSound(ok);S.lastAnswer={ok,exp:q.exp,rule:q.rule};if(ok){let add=S.mode==='boss'?200:100;S.score+=add;S.points+=add;S.monthly+=add;S.yearly+=add;S.correctStreak++;}else{S.correctStreak=0}S.screen='feedback';save();render()}
window.nextQuestion=function(){const max=S.mode==='boss'?5:3;S.questionIndex++;if(S.questionIndex>=max){S.tickets++;S.screen='results'}else S.screen='game';save();render()}
function claimBonus(){const today=new Date().toDateString();if(S.daily.last!==today){S.daily.last=today;S.daily.count=(S.daily.count||0)+1;let bonus=Math.min(S.daily.count,7)*10;S.points+=bonus;S.monthly+=bonus;S.yearly+=bonus;S.tickets++;}}
function playSound(ok){
 if(!S.settings.sound)return;
 try{
  const AC=window.AudioContext||window.webkitAudioContext;
  const ctx=new AC();
  const now=ctx.currentTime;
  function tone(freq,start,dur,peak,type='sine'){
   const osc=ctx.createOscillator();
   const gain=ctx.createGain();
   osc.type=type;
   osc.frequency.setValueAtTime(freq,now+start);
   gain.gain.setValueAtTime(0.0001,now+start);
   gain.gain.linearRampToValueAtTime(peak,now+start+0.012);
   gain.gain.exponentialRampToValueAtTime(0.0001,now+start+dur);
   osc.connect(gain); gain.connect(ctx.destination);
   osc.start(now+start); osc.stop(now+start+dur+0.025);
  }
  if(ok){
   // clean precise ding: bright bell-like sine tones, short decay
   tone(1046.5,0,0.30,0.17,'sine');
   tone(2093,0.002,0.22,0.055,'sine');
  }else{
   // clean short buzzer: low rounded tone with light harmonic, no harsh square wave
   tone(185,0,0.22,0.18,'triangle');
   tone(92.5,0.005,0.22,0.08,'sine');
  }
 }catch(e){}
}
window.renderRules=function(){document.getElementById('ruleList').innerHTML=ruleListHtml(document.getElementById('ruleSearch').value)}
window.renderProfiles=function(){document.getElementById('empList').innerHTML=profilesHtml(document.getElementById('empSearch').value)}
window.boardTab=function(t){S.boardTab=t;save();render()}
window.invite=function(id){const p=S.employees.find(e=>e.id===id);if(p){S.teamInvites.push(p.nick);save();alert('Invite sent to '+p.nick)}}
window.setAvatar=function(id){if(can(A.find(a=>a.id===id))){S.profile.avatar=id;save();render()}}
window.profileField=function(k,v){S.profile[k]=v;save();render()}
window.viewMode=function(v){S.viewMode=v;save();render()}
window.toggleSound=function(){S.settings.sound=!S.settings.sound;save();render()}
window.setRuleWeek=function(){S.settings.ruleOfWeekId=document.getElementById('rwk').value;save();render()}
window.addRule=function(){const id=rid.value.trim();if(!id)return;S.rules.push({id,section:rsec.value,title:rtitle.value,text:rtext.value,active:true});save();render()}
window.removeRule=function(id){let r=S.rules.find(x=>x.id===id);if(r)r.active=false;save();render()}
window.addQuestion=function(){S.questions.push({id:'q'+Date.now(),section:qsec.value,rule:qrule.value,q:qq.value,c:[c0.value,c1.value,c2.value,c3.value],a:+qa.value,exp:qexp.value,active:true});save();render()}
window.removeQuestion=function(id){let q=S.questions.find(x=>x.id===id);if(q)q.active=false;save();render()}
window.addReward=function(){S.rewards.push({id:'r'+Date.now(),title:rt.value,period:rp.value,desc:rd.value,active:true});save();render()}
window.toggleReward=function(id){let r=S.rewards.find(x=>x.id===id);if(r)r.active=!r.active;save();render()}
window.removeReward=function(id){S.rewards=S.rewards.filter(r=>r.id!==id);save();render()}
window.archiveMonth=function(){S.winners.unshift({month:new Date().toISOString().slice(0,7),team:S.teams[0].name,teamPoints:S.teams[0].monthly,solo:S.profile.nick,soloPoints:S.monthly});S.monthly=0;S.teams.forEach(t=>t.monthly=0);save();render()}
window.openDrawer=function(){document.getElementById('drawerRoot').innerHTML=`<div class="drawer-backdrop" onclick="closeDrawer()"></div><aside class="drawer"><button class="btn ghost" onclick="closeDrawer()" style="float:right">Close</button><h2>Rule Search</h2><button class="btn primary full" onclick="go('dashboard');closeDrawer()">Home</button><input class="input" id="drawerSearch" placeholder="Search rules" oninput="drawerRules(this.value)"><div id="drawerList">${ruleListHtml('')}</div></aside>`}
window.drawerRules=function(v){document.getElementById('drawerList').innerHTML=ruleListHtml(v)}
window.closeDrawer=function(){document.getElementById('drawerRoot').innerHTML=''}
window.resetApp=function(){localStorage.removeItem(LS);location.href=location.pathname+'?reset=1&v=110'}
if(new URLSearchParams(location.search).has('reset')){localStorage.removeItem(LS);S=structuredClone(seed);history.replaceState(null,'',location.pathname+'?v=110')}
render();
})();
</script>
