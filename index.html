<style>
:root{--blue:#0054a6;--blue2:#0b5cad;--navy:#061a33;--yellow:#ffd23f;--red:#e33b3b;--green:#18a558;--steel:#e7edf5;--ink:#102033;--muted:#667085;--card:#fff;--bg:#eef4fb;--shadow:#07325e25}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#0a3c79 0,#0b5cad 245px,#eef4fb 246px);color:var(--ink)}button,input,select,textarea{font:inherit}.wrap{max-width:470px;margin:0 auto;min-height:100vh;padding:12px}.app-shell{position:relative}.topbar{color:white;display:flex;align-items:center;gap:10px;margin:4px 0 12px}.menu-btn{width:45px;height:45px;border:0;border-radius:15px;background:#ffffff22;color:white;font-size:24px;font-weight:900;box-shadow:0 0 0 1px #ffffff33 inset}.logo{width:58px;height:58px;border-radius:18px;background:white;display:grid;place-items:center;box-shadow:0 8px 24px #00264d55;flex:0 0 auto}.logo svg{width:50px;height:50px}.title{flex:1;min-width:0}.title h1{font-size:22px;margin:0;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.title p{margin:4px 0 0;color:#d7ebff;font-weight:800;font-size:13px}.card{background:var(--card);border-radius:24px;padding:17px;box-shadow:0 14px 35px var(--shadow);margin:12px 0;border:1px solid #dbe6f2}.hero{text-align:center}.big{font-size:28px;font-weight:950;margin:4px 0;letter-spacing:-.03em}.sub{color:var(--muted);font-weight:700}.small{font-size:13px;color:var(--muted);font-weight:750}.btn{border:0;border-radius:17px;padding:13px 15px;font-weight:950;cursor:pointer;background:var(--blue);color:white;box-shadow:0 7px 0 #003970;display:inline-flex;align-items:center;justify-content:center;gap:8px;text-decoration:none}.btn:hover{filter:brightness(1.03)}.btn:active{transform:translateY(3px);box-shadow:0 4px 0 #003970}.btn.full{width:100%;font-size:17px}.btn.yellow{background:var(--yellow);color:#1b1b1b;box-shadow:0 7px 0 #c79a00}.btn.green{background:var(--green);box-shadow:0 7px 0 #0b7240}.btn.red{background:var(--red);box-shadow:0 7px 0 #9d2020}.btn.ghost{background:#eef4fb;color:var(--blue);box-shadow:none;border:2px solid #cfe0f1}.btn.tiny{padding:8px 10px;border-radius:12px;box-shadow:none;font-size:13px}.input,.select,.textarea{width:100%;border:2px solid #d5e1ee;border-radius:16px;padding:12px;margin:7px 0;background:white}.textarea{min-height:84px;resize:vertical}.row{display:flex;gap:9px;align-items:center}.row>*{flex:1}.stack{display:grid;gap:9px}.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stat{background:#f5f8fc;border:1px solid #dbe6f2;border-radius:18px;padding:12px}.stat b{font-size:21px}.tabs{position:sticky;bottom:0;z-index:4;display:grid;grid-template-columns:repeat(6,1fr);gap:4px;background:#ffffffee;backdrop-filter:blur(8px);border-radius:18px;padding:7px;border:1px solid #dbe6f2;box-shadow:0 -8px 22px #10203318}.tab{border:0;background:transparent;color:#667085;border-radius:14px;padding:9px 2px;font-size:11px;font-weight:950}.tab.active{background:var(--blue);color:white}.qbox{min-height:138px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:24px;font-weight:950;line-height:1.12}.choice{width:100%;text-align:left;border:2px solid #d5e1ee;background:white;border-radius:18px;padding:13px;margin:8px 0;font-weight:850}.choice.correct{border-color:var(--green);background:#e9fff3}.choice.wrong{border-color:var(--red);background:#fff0f0}.bar{height:14px;background:#dbe6f2;border-radius:999px;overflow:hidden}.bar>span{height:100%;display:block;background:repeating-linear-gradient(90deg,var(--yellow) 0 18px,#111 18px 27px);border-radius:999px;transition:.25s}.signal{font-size:50px}.list .item{padding:12px;border-radius:16px;background:#f7faff;border:1px solid #dbe6f2;margin:8px 0}.item h3{margin:0 0 4px}.tag{display:inline-block;background:#e8f1ff;color:#044d91;border-radius:99px;padding:5px 8px;margin:2px;font-size:12px;font-weight:950}.tag.green{background:#e9fff3;color:#0b7240}.tag.yellow{background:#fff7d6;color:#7a5b00}.tag.red{background:#fff0f0;color:#a32020}.adminbox{border:2px dashed #b8cae0;background:#fbfdff;border-radius:18px;padding:14px;margin:10px 0}.hidden{display:none!important}.footer-space{height:86px}.notice{background:#fff8dc;border:1px solid #f0d66b;border-radius:16px;padding:11px;font-weight:750}.rail{height:22px;background:linear-gradient(90deg,#333 0 8%,transparent 8% 16%);background-size:32px 8px;border-top:4px solid #555;border-bottom:4px solid #555;margin:8px 0;border-radius:4px}.center{text-align:center}.drawer-backdrop{position:fixed;inset:0;background:#00172e66;z-index:20}.drawer{position:fixed;top:0;left:0;bottom:0;width:min(360px,88vw);background:#fff;z-index:21;box-shadow:8px 0 30px #0003;padding:14px;overflow:auto}.drawer h2{margin:8px 0}.drawer-close{float:right}.rule-link{display:block;text-align:left;width:100%;border:1px solid #dbe6f2;background:#f7faff;border-radius:14px;padding:10px;margin:7px 0;font-weight:850}.rule-link small{display:block;color:var(--muted)}.seg{display:flex;background:#eef4fb;border-radius:15px;padding:4px;gap:4px}.seg button{flex:1;border:0;border-radius:12px;padding:9px;font-weight:900;color:var(--muted)}.seg button.active{background:white;color:var(--blue);box-shadow:0 2px 10px #0001}.winner{background:linear-gradient(135deg,#fff7d6,#e8f1ff);border:2px solid #ffd23f}.reward{background:linear-gradient(135deg,#ffffff,#f4f9ff);border-left:7px solid var(--yellow)}.mobile-mode .wrap{max-width:390px}.mobile-mode .card{border-radius:28px}.mobile-mode .big{font-size:30px}.mobile-mode .tabs{grid-template-columns:repeat(3,1fr)}.mobile-mode .tab{font-size:12px;padding:11px 2px}.mobile-mode .qbox{font-size:26px}.desktop-mode .wrap{max-width:980px}.desktop-mode .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.desktop-mode .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}@media(min-width:820px){body:not(.mobile-mode) .wrap{max-width:980px}body:not(.mobile-mode) .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}body:not(.mobile-mode) .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}}@media(max-width:380px){.title h1{font-size:18px}.logo{width:50px;height:50px}.tabs{grid-template-columns:repeat(3,1fr)}.tab{font-size:12px}.row{flex-direction:column;align-items:stretch}}

<body><div class="wrap"><div class="app-shell"><header class="topbar"><button class="menu-btn" onclick="openRulesDrawer()" title="Rules search">☰</button><div class="logo" aria-label="Safety Sprint logo"><svg viewBox="0 0 120 120" role="img"><circle cx="60" cy="60" r="55" fill="#ffd23f" stroke="#061a33" stroke-width="6"/><path d="M26 33l61 61M87 33L26 94" stroke="#fff" stroke-width="14" stroke-linecap="round"/><path d="M26 33l61 61M87 33L26 94" stroke="#061a33" stroke-width="5" stroke-linecap="round"/><circle cx="34" cy="83" r="8" fill="#e33b3b" stroke="#061a33" stroke-width="4"/><circle cx="86" cy="83" r="8" fill="#e33b3b" stroke="#061a33" stroke-width="4"/><text x="60" y="31" text-anchor="middle" font-size="16" font-weight="900" fill="#061a33">RR</text><text x="60" y="109" text-anchor="middle" font-size="14" font-weight="900" fill="#061a33">SAFE</text></svg></div><div class="title"><h1>Conrail Safety Sprint</h1><p>Get the green signal.</p></div></header><div id="drawerRoot"></div><main id="app"></main><div class="footer-space"></div></div></div><script>
(function(){
const LS='css_v4_full_working';
const now=()=>new Date();
const monthKey=(d=now())=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
const yearKey=(d=now())=>String(d.getFullYear());
const seed={
 user:null, screen:'login', tab:'play', viewMode:'auto', settings:{teamsEnabled:true,focusSection:'All',ruleOfWeekId:'OR-101',lastMonthlyAlertMonth:null}, team:'north', tickets:0, streak:0, badges:[], sessions:[], answers:[], monthlyWinners:[], rewards:[
  {id:'rw1',period:'Monthly',title:'Team Pizza Lunch',desc:'Winning team gets lunch recognition.',active:true},
  {id:'rw2',period:'Monthly',title:'Safety Swag Raffle',desc:'Earn tickets by completing daily sprints.',active:true},
  {id:'rw3',period:'Yearly',title:'Yard Legend Award',desc:'Highest yearly score gets company recognition.',active:true}
 ], teams:[
  {id:'north',name:'North Jersey Crew',points:18500,members:8,monthly:4200,yearly:18500},
  {id:'south',name:'South Jersey Switchers',points:20400,members:9,monthly:5100,yearly:20400},
  {id:'detroit',name:'Detroit Yard Hawks',points:16200,members:6,monthly:3900,yearly:16200}
 ], players:[
  {nick:'TrackBoss92',team:'South Jersey Switchers',month:4500,year:18800},
  {nick:'RailRanger',team:'Detroit Yard Hawks',month:3900,year:14050},
  {nick:'SignalSam',team:'North Jersey Crew',month:3100,year:11900}
 ], questions:[
  {id:'q1',rule:'OR-101',section:'Operating Rules',difficulty:'Easy',question:'You see conflicting instructions before a move. What should you do first?',choices:['Keep moving if the track looks clear','Ask about it after the move','Stop and verify the instruction','Ignore the newer instruction'],correct:2,explanation:'When instructions conflict, stop and verify before continuing.',active:true},
  {id:'q2',rule:'SAFE-201',section:'Personal Safety',difficulty:'Easy',question:'A shortcut saves time but skips required protection. What is the safe choice?',choices:['Take the shortcut if no one sees','Skip only if behind schedule','Use the required safe procedure','Let the newest employee decide'],correct:2,explanation:'Required protection and safe procedure always come before speed.',active:true},
  {id:'q3',rule:'PPE-301',section:'PPE',difficulty:'Easy',question:'Required PPE is missing before entering a work area. What should happen?',choices:['Enter quickly','Borrow later','Stop until PPE is corrected','Work farther away'],correct:2,explanation:'Do not enter the work area until required PPE is in place.',active:true},
  {id:'q4',rule:'COMM-401',section:'Communication',difficulty:'Medium',question:'A radio message is unclear during a movement. What should you do?',choices:['Guess the message','Continue slowly','Stop and request clarification','Use hand signals later'],correct:2,explanation:'Unclear communication must be clarified before action continues.',active:true},
  {id:'q5',rule:'YARD-501',section:'Yard Safety',difficulty:'Medium',question:'You are unsure if the route is properly lined. What is the right move?',choices:['Proceed because it was lined yesterday','Stop and verify the route','Ask after passing it','Let the timer decide'],correct:1,explanation:'When unsure, stop and verify the route before proceeding.',active:true},
  {id:'q6',rule:'HAZ-601',section:'Hazmat',difficulty:'Medium',question:'You see a possible leak or unknown spill near equipment. What comes first?',choices:['Touch it to identify it','Move closer for a photo','Stay clear and report it','Wash it away'],correct:2,explanation:'Stay clear and report possible hazmat concerns immediately.',active:true}
 ],
 rules:[
  {id:'OR-101',title:'Conflicting Instructions',section:'Operating Rules',text:'If instructions conflict or are unclear, stop, verify, and clarify before continuing. Do not guess.',active:true},
  {id:'SAFE-201',title:'No Shortcuts Around Protection',section:'Personal Safety',text:'Required protection and safe work procedures must be followed every time, even when work is delayed.',active:true},
  {id:'PPE-301',title:'Required PPE',section:'PPE',text:'Employees must use required PPE before entering designated work areas or performing tasks requiring protection.',active:true},
  {id:'COMM-401',title:'Clear Communication',section:'Communication',text:'Unclear radio, verbal, or written communication must be repeated or clarified before action is taken.',active:true},
  {id:'YARD-501',title:'Verify Route and Conditions',section:'Yard Safety',text:'When unsure about route, track condition, or authority, stop and verify before proceeding.',active:true},
  {id:'HAZ-601',title:'Unknown Spill or Leak',section:'Hazmat',text:'Stay clear of possible hazardous materials and report immediately through approved channels.',active:true}
 ]
};
let S=load(); let game=null;
function load(){try{let s=JSON.parse(localStorage.getItem(LS)||'null'); if(!s)return structuredClone(seed); return merge(structuredClone(seed),s)}catch(e){return structuredClone(seed)}}
function merge(a,b){for(const k in b){if(b[k]&&typeof b[k]==='object'&&!Array.isArray(b[k])&&a[k])a[k]=merge(a[k],b[k]);else a[k]=b[k]}return a}
function save(){localStorage.setItem(LS,JSON.stringify(S));applyViewMode()}
function esc(x){return String(x??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function uid(p){return p+Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function sections(){return ['All',...Array.from(new Set(S.rules.filter(r=>r.active).map(r=>r.section).concat(S.questions.filter(q=>q.active).map(q=>q.section))))].filter(Boolean)}
function qPool(){let qs=S.questions.filter(q=>q.active); if(S.settings.focusSection&&S.settings.focusSection!=='All')qs=qs.filter(q=>q.section===S.settings.focusSection); if(qs.length<1)qs=S.questions.filter(q=>q.active); return qs}
function points(){return S.sessions.reduce((n,s)=>n+(s.score||0),0)}
function monthPoints(){return S.sessions.filter(s=>s.month===monthKey()).reduce((n,s)=>n+s.score,0)}
function level(){const p=points(); if(p>=15000)return 'Blue Badge Boss'; if(p>=10000)return 'Rule Wrangler'; if(p>=6000)return 'Safety Switchman'; if(p>=3000)return 'Signal Spotter'; if(p>=1000)return 'Track Trainee'; return 'Yard Rookie'}
function rule(id){return S.rules.find(r=>r.id===id)||S.rules[0]}
function currentTeam(){return S.teams.find(t=>t.id===S.team)||S.teams[0]}
function activeRewards(){return S.rewards.filter(r=>r.active)}
function monthlyWinners(){let team=[...S.teams].sort((a,b)=>(b.monthly||0)-(a.monthly||0))[0]; let solo=[...S.players,{nick:S.user?.nick||'You',team:currentTeam()?.name||'No Team',month:monthPoints(),year:points()}].sort((a,b)=>(b.month||0)-(a.month||0))[0]; return {team,solo,month:monthKey()}}
function maybeAlertAdmin(){if(!S.user||S.user.role!=='admin')return ''; const d=now(); const lastDay=new Date(d.getFullYear(),d.getMonth()+1,0).getDate(); if(d.getDate()>=28 && S.settings.lastMonthlyAlertMonth!==monthKey()){const w=monthlyWinners(); return `<div class="card winner"><h2>🏆 Month-End Admin Alert</h2><p><b>Team winner:</b> ${esc(w.team.name)} with ${w.team.monthly||0} monthly points.</p><p><b>Solo leader:</b> ${esc(w.solo.nick)} with ${w.solo.month||0} monthly points.</p><button class="btn full yellow" onclick="archiveMonth()">Archive This Month & Reset Monthly Board</button><p class="small">Shown near month end so rewards can be prepared. This prototype can also be archived manually.</p></div>`} return ''}
function applyViewMode(){document.body.classList.remove('mobile-mode','desktop-mode'); if(S.viewMode==='mobile')document.body.classList.add('mobile-mode'); if(S.viewMode==='desktop')document.body.classList.add('desktop-mode')}
function nav(active){const items=[['play','Play'],['teams','Teams'],['rules','Rules'],['board','Board'],['rewards','Rewards'],['me','Me']];return `<nav class="tabs">${items.map(([k,v])=>`<button class="tab ${active===k?'active':''}" onclick="go('${k}')">${v}</button>`).join('')}</nav>`}
window.go=function(t){S.tab=t;S.screen='home';save();render()}
window.resetApp=function(){if(confirm('Reset local demo app data?')){localStorage.removeItem(LS);S=structuredClone(seed);game=null;render()}}
window.login=function(){const email=document.getElementById('email').value.trim().toLowerCase(); if(!email.endsWith('@conrail.com')){toast('Wrong track. Use an @conrail.com email.');return} S.user={email,nick:'',role:email.includes('manager')||email.includes('admin')?'admin':'employee'}; S.screen='profile'; save();render()}
window.demo=function(){S.user={email:'demo.manager@conrail.com',nick:'Big Mike',role:'admin'};S.screen='home';S.tab='play';save();render()}
window.saveProfile=function(){S.user.nick=document.getElementById('nick').value.trim()||'Safety Sprinter'; const t=document.getElementById('team').value.trim(); if(t){let found=S.teams.find(x=>x.name.toLowerCase()===t.toLowerCase()); if(!found){found={id:uid('team'),name:t,points:0,members:1,monthly:0,yearly:0};S.teams.push(found)} S.team=found.id} S.screen='home';save();render()}
window.startGame=function(mode='daily'){let pool=[...qPool()].sort(()=>Math.random()-.5); const n=mode==='boss'?10:5; while(pool.length<n&&pool.length>0)pool=pool.concat([...pool].sort(()=>Math.random()-.5)); game={mode,i:0,score:0,correct:0,answers:[],qs:pool.slice(0,n)}; if(!game.qs.length){toast('No active questions found. Add questions in Admin.');return} S.screen='game';save();render()}
window.answer=function(idx){const q=game.qs[game.i], ok=idx===q.correct; let add=ok?100:0; if(ok&&game.answers.filter(a=>a.ok).length===2)add+=100; game.score+=add; game.correct+=ok?1:0; game.answers.push({qid:q.id,rule:q.rule,sel:idx,ok,section:q.section,month:monthKey(),year:yearKey()}); S.screen='feedback'; save();render()}
window.nextQ=function(){game.i++; if(game.i>=game.qs.length)finish(); else S.screen='game'; save();render()}
function finish(){const missed=game.answers.filter(a=>!a.ok); const perfect=game.correct===game.qs.length; game.score+=250+(perfect?500:0); const tickets=1+(perfect?1:0)+(game.mode==='boss'?3:0); S.tickets+=tickets; S.streak+=1; if(perfect&&!S.badges.includes('Green Signal'))S.badges.push('Green Signal'); if(S.streak>=7&&!S.badges.includes('Streak Engine'))S.badges.push('Streak Engine'); const sess={id:uid('s'),date:new Date().toLocaleDateString(),month:monthKey(),year:yearKey(),mode:game.mode,score:game.score,correct:game.correct,total:game.qs.length,tickets,section:S.settings.focusSection||'All'}; S.sessions.unshift(sess); S.answers.unshift(...game.answers); const t=currentTeam(); if(t){t.points=(t.points||0)+game.score;t.monthly=(t.monthly||0)+game.score;t.yearly=(t.yearly||0)+game.score} S.screen='results';save()}
window.createTeam=function(){const name=document.getElementById('newteam').value.trim(); if(!name)return; const id=uid('team'); S.teams.push({id,name,points:0,members:1,monthly:0,yearly:0});S.team=id;save();render()}
window.joinTeam=function(id){S.team=id;save();render()}
window.setFocus=function(){S.settings.focusSection=document.getElementById('focusSection').value;save();render()}
window.setRuleWeek=function(){S.settings.ruleOfWeekId=document.getElementById('ruleWeek').value;save();render()}
window.toggleTeams=function(){S.settings.teamsEnabled=!S.settings.teamsEnabled;save();render()}
window.setViewMode=function(mode){S.viewMode=mode;save();render()}
window.openRulesDrawer=function(){document.getElementById('drawerRoot').innerHTML=drawer()}
window.closeRulesDrawer=function(){document.getElementById('drawerRoot').innerHTML=''}
window.filterDrawer=function(){openRulesDrawer();setTimeout(()=>{const i=document.getElementById('drawerSearch'); if(i)i.focus()},0)}
window.openRule=function(id){S.tab='rules';S.screen='home';S.openRuleId=id;closeRulesDrawer();save();render()}
window.addRule=function(){const id=document.getElementById('ruleId').value.trim().toUpperCase()||uid('R'); const title=document.getElementById('ruleTitle').value.trim()||'Untitled Rule'; const section=document.getElementById('ruleSection').value.trim()||'General'; const text=document.getElementById('ruleText').value.trim()||'Rule text goes here.'; const ex=S.rules.find(r=>r.id===id); if(ex)Object.assign(ex,{title,section,text,active:true}); else S.rules.push({id,title,section,text,active:true}); S.settings.ruleOfWeekId=S.settings.ruleOfWeekId||id; save();render();toast('Rule saved.')}
window.removeRule=function(id){if(confirm('Remove/deactivate this rule?')){const r=S.rules.find(x=>x.id===id); if(r)r.active=false; save();render()}}
window.addQuestion=function(){const section=document.getElementById('qSection').value.trim()||'General'; const question=document.getElementById('qQuestion').value.trim(); if(!question){toast('Question text is required.');return} const choices=[0,1,2,3].map(i=>document.getElementById('qChoice'+i).value.trim()||('Choice '+(i+1))); const correct=Number(document.getElementById('qCorrect').value); const explanation=document.getElementById('qExp').value.trim()||'Review the related rule.'; const r=document.getElementById('qRule').value.trim()||S.rules[0]?.id||'RULE'; S.questions.push({id:uid('q'),rule:r,section,difficulty:'Custom',question,choices,correct,explanation,active:true}); save();render();toast('Question added.')}
window.removeQuestion=function(id){if(confirm('Remove/deactivate this question?')){const q=S.questions.find(x=>x.id===id); if(q)q.active=false; save();render()}}
window.addReward=function(){const title=document.getElementById('rwTitle').value.trim(); if(!title){toast('Reward title is required.');return} S.rewards.push({id:uid('rw'),period:document.getElementById('rwPeriod').value,title,desc:document.getElementById('rwDesc').value.trim(),active:true}); save();render();toast('Reward added.')}
window.toggleReward=function(id){const r=S.rewards.find(x=>x.id===id); if(r)r.active=!r.active; save();render()}
window.removeReward=function(id){if(confirm('Remove this reward?')){S.rewards=S.rewards.filter(r=>r.id!==id); save();render()}}
window.archiveMonth=function(){const w=monthlyWinners(); S.monthlyWinners.unshift({month:monthKey(),team:w.team.name,teamPoints:w.team.monthly||0,solo:w.solo.nick,soloPoints:w.solo.month||0}); S.teams.forEach(t=>t.monthly=0); S.players.forEach(p=>p.month=0); S.settings.lastMonthlyAlertMonth=monthKey(); save();render();toast('Monthly winners archived and monthly board reset.')}
function toast(t){const A=document.getElementById('app'); if(A)A.insertAdjacentHTML('afterbegin',`<div class="card notice">${esc(t)}</div>`)}
function drawer(){const q=(document.getElementById('drawerSearch')||{}).value||''; const sec=(document.getElementById('drawerSection')||{}).value||'All'; let rows=S.rules.filter(r=>r.active); if(sec!=='All')rows=rows.filter(r=>r.section===sec); if(q)rows=rows.filter(r=>(r.id+r.title+r.section+r.text).toLowerCase().includes(q.toLowerCase())); return `<div class="drawer-backdrop" onclick="closeRulesDrawer()"></div><aside class="drawer"><button class="btn tiny ghost drawer-close" onclick="closeRulesDrawer()">Close</button><h2>Rule Search</h2><p class="small">Top-left dropdown reference menu.</p><input id="drawerSearch" class="input" placeholder="Search rules" value="${esc(q)}" oninput="filterDrawer()"><select id="drawerSection" class="select" onchange="filterDrawer()">${sections().map(s=>`<option ${s===sec?'selected':''}>${esc(s)}</option>`).join('')}</select>${rows.map(r=>`<button class="rule-link" onclick="openRule('${esc(r.id)}')"><b>${esc(r.id)} — ${esc(r.title)}</b><small>${esc(r.section)}</small></button>`).join('')||'<p class="small">No rules found.</p>'}</aside>`}
function loginView(){return `<section class="card hero"><div class="signal">🚦</div><div class="big">Locked Rail Yard</div><p class="sub">Only verified @conrail.com emails can enter.</p><input id="email" class="input" placeholder="name@conrail.com" inputmode="email"><button class="btn full" onclick="login()">Send Magic Link</button><button class="btn ghost full" style="margin-top:10px" onclick="demo()">Demo Unlock</button><p class="small">Prototype note: real launch needs backend domain enforcement.</p></section>`}
function profileView(){return `<section class="card"><h2>Build Your Crew Card</h2><input id="nick" class="input" placeholder="Nickname" value="${esc(S.user.nick||'')}"><input id="team" class="input" placeholder="Team / Terminal" value="${esc(currentTeam()?.name||'')}"><label class="small"><input type="checkbox" checked> I understand this app tracks game progress for safety learning rewards.</label><br><br><button class="btn full green" onclick="saveProfile()">Enter the Yard</button></section>`}
function home(){const row=rule(S.settings.ruleOfWeekId);return `<div class="grid2"><section>${maybeAlertAdmin()}<div class="card hero"><div class="rail"></div><div class="big">Today's Safety Sprint</div><p class="sub">Focus: <b>${esc(S.settings.focusSection||'All')}</b></p><button class="btn full yellow" onclick="startGame('daily')">🚂 Start Today's Sprint</button><button class="btn full ghost" style="margin-top:10px" onclick="startGame('boss')">👾 Boss Battle</button></div><div class="card winner"><h2>⭐ Rule of the Week</h2><span class="tag yellow">${esc(row?.section)}</span><h3>${esc(row?.id)} — ${esc(row?.title)}</h3><p>${esc(row?.text)}</p><button class="btn ghost" onclick="openRule('${esc(row?.id)}')">Read Rule</button></div></section><section><div class="card statgrid"><div class="stat"><span class="small">Level</span><br><b>${level()}</b></div><div class="stat"><span class="small">Year Points</span><br><b>${points()}</b></div><div class="stat"><span class="small">Month Points</span><br><b>${monthPoints()}</b></div><div class="stat"><span class="small">Tickets</span><br><b>${S.tickets}</b></div></div><div class="card"><h2>Current Rewards</h2>${activeRewards().slice(0,3).map(r=>`<div class="item reward"><b>${esc(r.period)}: ${esc(r.title)}</b><br><span class="small">${esc(r.desc)}</span></div>`).join('')||'<p class="small">No rewards posted yet.</p>'}</div>${nav('play')}</section></div>`}
function gameView(){const q=game.qs[game.i]; const pct=((game.i)/game.qs.length)*100;return `<section class="card"><div class="small">Question ${game.i+1} of ${game.qs.length} • ${esc(q.section)} • ${esc(q.rule)}</div><div class="bar"><span style="width:${pct+10}%"></span></div><div class="qbox">${esc(q.question)}</div>${q.choices.map((a,i)=>`<button class="choice" onclick="answer(${i})"><b>${'ABCD'[i]}.</b> ${esc(a)}</button>`).join('')}</section>`}
function feedback(){const last=game.answers.at(-1), q=game.qs.find(x=>x.id===last.qid);return `<section class="card center"><div class="signal">${last.ok?'✅':'🚧'}</div><div class="big">${last.ok?'Green Signal!':'Red Signal!'}</div><p class="sub">${last.ok?'Safe choice locked in.':'Not quite. Let’s reroute.'}</p><div class="notice"><b>Correct:</b> ${esc(q.choices[q.correct])}<br>${esc(q.explanation)}<br><span class="tag">${esc(q.rule)}</span></div><br><button class="btn full" onclick="nextQ()">${game.i+1>=game.qs.length?'See Results':'Next Question'}</button></section>`}
function results(){const missed=game.answers.filter(a=>!a.ok).map(a=>a.rule);return `<section class="card center"><div class="signal">🏁</div><div class="big">Sprint Complete!</div><div class="statgrid"><div class="stat"><span class="small">Score</span><br><b>${game.score}</b></div><div class="stat"><span class="small">Correct</span><br><b>${game.correct}/${game.qs.length}</b></div><div class="stat"><span class="small">Tickets</span><br><b>+${game.correct===game.qs.length?2:1}</b></div><div class="stat"><span class="small">Section</span><br><b>${esc(S.settings.focusSection||'All')}</b></div></div>${missed.length?`<div class="notice"><b>Review these rules:</b><br>${missed.map(r=>`<button class="btn tiny ghost" onclick="openRule('${esc(r)}')">${esc(r)}</button>`).join(' ')}</div>`:'<p class="sub">Perfect round. Green Signal badge earned.</p>'}<button class="btn full yellow" onclick="startGame('daily')">Play Again</button>${nav('play')}</section>`}
function teams(){return `<section class="card"><h2>Team Competition</h2><p class="sub">${S.settings.teamsEnabled?'Team play is enabled.':'Team play is currently disabled by admin.'}</p>${S.settings.teamsEnabled?`<div class="row"><input id="newteam" class="input" placeholder="Create team name"><button class="btn" onclick="createTeam()">Create</button></div><div class="list">${[...S.teams].sort((a,b)=>(b.monthly||0)-(a.monthly||0)).map((t,i)=>`<div class="item"><h3>${i+1}. ${esc(t.name)} ${S.team===t.id?'✅':''}</h3><span class="small">Monthly: ${t.monthly||0} • Yearly: ${t.yearly||0} • Members: ${t.members}</span><br><button class="btn ghost tiny" onclick="joinTeam('${t.id}')">Join Team</button></div>`).join('')}</div>`:''}${nav('teams')}</section>`}
function rules(){let rows=S.rules.filter(r=>r.active); const open=S.openRuleId?rule(S.openRuleId):null;return `<section class="card"><h2>Rules Dictionary</h2><p class="sub">Use the ☰ menu in the top-left for the dropdown search.</p>${open?`<div class="notice"><h3>${esc(open.id)} — ${esc(open.title)}</h3><span class="tag">${esc(open.section)}</span><p>${esc(open.text)}</p></div>`:''}<div class="list">${rows.map(r=>`<div class="item"><h3>${esc(r.id)} — ${esc(r.title)}</h3><span class="tag">${esc(r.section)}</span><p>${esc(r.text)}</p><button class="btn ghost tiny" onclick="openRule('${esc(r.id)}')">Open</button></div>`).join('')}</div>${nav('rules')}</section>`}
function board(){const tab=S.boardTab||'month'; const me={nick:S.user?.nick||'You',team:currentTeam()?.name||'No Team',month:monthPoints(),year:points()}; const solo=[...S.players,me].sort((a,b)=>(tab==='month'?b.month-a.month:b.year-a.year)); const teams=[...S.teams].sort((a,b)=>(tab==='month'?(b.monthly||0)-(a.monthly||0):(b.yearly||0)-(a.yearly||0)));return `<section class="card"><h2>Leaderboard</h2><div class="seg"><button class="${tab==='month'?'active':''}" onclick="S.boardTab='month';save();render()">Monthly</button><button class="${tab==='year'?'active':''}" onclick="S.boardTab='year';save();render()">Yearly</button><button class="${tab==='history'?'active':''}" onclick="S.boardTab='history';save();render()">Winners</button></div>${tab==='history'?`<h3>Month-to-Month Winners</h3><div class="list">${S.monthlyWinners.map(w=>`<div class="item winner"><b>${esc(w.month)}</b><br>Team: ${esc(w.team)} (${w.teamPoints})<br>Solo: ${esc(w.solo)} (${w.soloPoints})</div>`).join('')||'<p class="small">No archived winners yet. Admin can archive at month end.</p>'}</div>`:`<h3>${tab==='month'?'Monthly':'Yearly'} Individual</h3><div class="list">${solo.map((p,i)=>`<div class="item"><b>${i+1}. ${esc(p.nick)}</b><br><span class="small">${esc(p.team)} • ${tab==='month'?p.month:p.year} points</span></div>`).join('')}</div><h3>${tab==='month'?'Monthly':'Yearly'} Team</h3><div class="list">${teams.map((t,i)=>`<div class="item"><b>${i+1}. ${esc(t.name)}</b><br><span class="small">${tab==='month'?t.monthly:t.yearly} points</span></div>`).join('')}</div>`}${nav('board')}</section>`}
function rewards(){return `<section class="card"><h2>Rewards</h2><p class="sub">See what teams and solo players can win this month and year.</p><div class="list">${S.rewards.map(r=>`<div class="item reward"><h3>${esc(r.period)} — ${esc(r.title)} ${r.active?'':'(Hidden)'}</h3><p>${esc(r.desc)}</p></div>`).join('')||'<p class="small">No rewards posted.</p>'}</div>${nav('rewards')}</section>`}
function me(){return `<section class="card"><h2>My Profile</h2><p><b>Email:</b> ${esc(S.user.email)}</p><p><b>Nickname:</b> ${esc(S.user.nick||'Safety Sprinter')}</p><p><b>Team:</b> ${esc(currentTeam()?.name||'None')}</p><p><b>Level:</b> ${level()}</p><p><b>Badges:</b> ${S.badges.length?S.badges.map(b=>`<span class="tag">${esc(b)}</span>`).join(''):'No badges yet'}</p><h3>Device View</h3><div class="seg"><button class="${S.viewMode==='auto'?'active':''}" onclick="setViewMode('auto')">Auto</button><button class="${S.viewMode==='mobile'?'active':''}" onclick="setViewMode('mobile')">Mobile</button><button class="${S.viewMode==='desktop'?'active':''}" onclick="setViewMode('desktop')">Desktop</button></div><br>${S.user.role==='admin'?'<button class="btn ghost full" onclick="S.screen=\'admin\';render()">Open Admin Dashboard</button>':''}<button class="btn red full" style="margin-top:10px" onclick="resetApp()">Reset Demo App</button>${nav('me')}</section>`}
function admin(){return `<section class="card"><h2>Manager Dashboard</h2><div class="grid2"><div class="adminbox"><b>Team Competition</b><p class="small">Allow employees to create and join teams.</p><button class="btn ${S.settings.teamsEnabled?'red':'green'}" onclick="toggleTeams()">${S.settings.teamsEnabled?'Disable':'Enable'} Teams</button></div><div class="adminbox"><b>Question Focus Section</b><p class="small">Random questions will focus on the selected rule section.</p><select id="focusSection" class="select" onchange="setFocus()">${sections().map(s=>`<option ${S.settings.focusSection===s?'selected':''}>${esc(s)}</option>`).join('')}</select></div></div><div class="adminbox"><h3>Rule of the Week</h3><select id="ruleWeek" class="select" onchange="setRuleWeek()">${S.rules.filter(r=>r.active).map(r=>`<option value="${esc(r.id)}" ${S.settings.ruleOfWeekId===r.id?'selected':''}>${esc(r.id)} — ${esc(r.title)}</option>`).join('')}</select></div><div class="grid2"><div class="adminbox"><h3>Add / Update Rule</h3><input id="ruleId" class="input" placeholder="Rule ID, ex: OR-102"><input id="ruleTitle" class="input" placeholder="Rule title"><input id="ruleSection" class="input" placeholder="Section, ex: Operating Rules"><textarea id="ruleText" class="textarea" placeholder="Rule text"></textarea><button class="btn full green" onclick="addRule()">Save Rule</button><div class="list">${S.rules.filter(r=>r.active).map(r=>`<div class="item"><b>${esc(r.id)}</b> ${esc(r.title)}<br><button class="btn tiny red" onclick="removeRule('${esc(r.id)}')">Remove</button></div>`).join('')}</div></div><div class="adminbox"><h3>Add Question</h3><input id="qQuestion" class="input" placeholder="Question text"><input id="qSection" class="input" placeholder="Section"><input id="qRule" class="input" placeholder="Related Rule ID"><input id="qChoice0" class="input" placeholder="Choice A"><input id="qChoice1" class="input" placeholder="Choice B"><input id="qChoice2" class="input" placeholder="Choice C"><input id="qChoice3" class="input" placeholder="Choice D"><select id="qCorrect" class="select"><option value="0">A is correct</option><option value="1">B is correct</option><option value="2">C is correct</option><option value="3">D is correct</option></select><textarea id="qExp" class="textarea" placeholder="Short explanation"></textarea><button class="btn full green" onclick="addQuestion()">Add Question</button><div class="list">${S.questions.filter(q=>q.active).slice(0,12).map(q=>`<div class="item"><b>${esc(q.section)}</b><br>${esc(q.question)}<br><button class="btn tiny red" onclick="removeQuestion('${esc(q.id)}')">Remove</button></div>`).join('')}</div></div></div><div class="adminbox"><h3>Rewards / Prizes</h3><input id="rwTitle" class="input" placeholder="Prize title"><select id="rwPeriod" class="select"><option>Monthly</option><option>Yearly</option></select><textarea id="rwDesc" class="textarea" placeholder="Prize description"></textarea><button class="btn full green" onclick="addReward()">Add Reward</button><div class="list">${S.rewards.map(r=>`<div class="item reward"><b>${esc(r.period)}: ${esc(r.title)}</b><p>${esc(r.desc)}</p><button class="btn tiny ghost" onclick="toggleReward('${r.id}')">${r.active?'Hide':'Show'}</button> <button class="btn tiny red" onclick="removeReward('${r.id}')">Remove</button></div>`).join('')}</div></div><div class="adminbox"><h3>Month-End Controls</h3><p class="small">Archive monthly winners, reset monthly team/player scores, and keep yearly scores.</p><button class="btn full yellow" onclick="archiveMonth()">Archive Month & Reset Monthly Board</button></div><button class="btn full" onclick="S.screen='home';S.tab='me';render()">Back to Profile</button></section>`}
function render(){applyViewMode(); const A=document.getElementById('app'); if(!S.user)A.innerHTML=loginView(); else if(S.screen==='profile')A.innerHTML=profileView(); else if(S.screen==='game')A.innerHTML=gameView(); else if(S.screen==='feedback')A.innerHTML=feedback(); else if(S.screen==='results')A.innerHTML=results(); else if(S.screen==='admin')A.innerHTML=admin(); else if(S.tab==='teams')A.innerHTML=teams(); else if(S.tab==='rules')A.innerHTML=rules(); else if(S.tab==='board')A.innerHTML=board(); else if(S.tab==='rewards')A.innerHTML=rewards(); else if(S.tab==='me')A.innerHTML=me(); else A.innerHTML=home()}
window.addEventListener('error',e=>{document.getElementById('app').innerHTML='<section class="card"><h2>App Error</h2><p>'+esc(e.message)+'</p><button class="btn" onclick="resetApp()">Reset</button></section>'});
if(new URLSearchParams(location.search).has('reset')){localStorage.removeItem(LS);S=structuredClone(seed);history.replaceState(null,'',location.pathname)}
applyViewMode(); render();
})();
</script></body></html>
