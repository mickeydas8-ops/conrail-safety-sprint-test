<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0054a6">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-192.svg">
<title>Conrail Safety Sprint</title>
<style>
:root{--blue:#0054a6;--navy:#061a33;--yellow:#ffd23f;--red:#e33b3b;--green:#18a558;--steel:#e7edf5;--ink:#102033;--muted:#667085;--card:#ffffff;--bg:#eef4fb}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#0a3c79 0,#0b5cad 230px,#eef4fb 231px);color:var(--ink)}button,input,select{font:inherit}.wrap{max-width:430px;margin:0 auto;min-height:100vh;padding:14px}.top{color:white;display:flex;align-items:center;gap:12px;margin:4px 0 12px}.logo{width:58px;height:58px;border-radius:18px;background:white;display:grid;place-items:center;box-shadow:0 8px 24px #00264d55}.logo svg{width:50px;height:50px}.title h1{font-size:23px;margin:0;line-height:1}.title p{margin:4px 0 0;color:#d7ebff;font-weight:700}.card{background:var(--card);border-radius:24px;padding:18px;box-shadow:0 14px 35px #07325e25;margin:12px 0;border:1px solid #dbe6f2}.hero{text-align:center}.big{font-size:30px;font-weight:900;margin:4px 0}.sub{color:var(--muted);font-weight:650}.btn{border:0;border-radius:18px;padding:14px 16px;font-weight:900;cursor:pointer;background:var(--blue);color:white;box-shadow:0 8px 0 #003970;display:inline-flex;align-items:center;justify-content:center;gap:8px}.btn:active{transform:translateY(3px);box-shadow:0 5px 0 #003970}.btn.full{width:100%;font-size:18px}.btn.yellow{background:var(--yellow);color:#1b1b1b;box-shadow:0 8px 0 #c79a00}.btn.green{background:var(--green);box-shadow:0 8px 0 #0b7240}.btn.red{background:var(--red);box-shadow:0 8px 0 #9d2020}.btn.ghost{background:#eef4fb;color:var(--blue);box-shadow:none;border:2px solid #cfe0f1}.input{width:100%;border:2px solid #d5e1ee;border-radius:16px;padding:13px;margin:8px 0;background:white}.row{display:flex;gap:10px}.row>*{flex:1}.pill{display:inline-flex;align-items:center;gap:6px;background:#eef6ff;color:#00447f;border-radius:999px;padding:8px 10px;font-weight:850;margin:3px}.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stat{background:#f5f8fc;border:1px solid #dbe6f2;border-radius:18px;padding:12px}.stat b{font-size:22px}.tabs{position:sticky;bottom:0;display:grid;grid-template-columns:repeat(5,1fr);gap:5px;background:#ffffffee;backdrop-filter:blur(8px);border-radius:18px;padding:7px;border:1px solid #dbe6f2;box-shadow:0 -8px 22px #10203318}.tab{border:0;background:transparent;color:#667085;border-radius:14px;padding:9px 2px;font-size:12px;font-weight:900}.tab.active{background:var(--blue);color:white}.qbox{min-height:140px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:24px;font-weight:950;line-height:1.12}.choice{width:100%;text-align:left;border:2px solid #d5e1ee;background:white;border-radius:18px;padding:13px;margin:8px 0;font-weight:850}.choice.correct{border-color:var(--green);background:#e9fff3}.choice.wrong{border-color:var(--red);background:#fff0f0}.bar{height:14px;background:#dbe6f2;border-radius:999px;overflow:hidden}.bar>span{height:100%;display:block;background:repeating-linear-gradient(90deg,var(--yellow) 0 18px,#111 18px 27px);border-radius:999px;transition:.25s}.signal{font-size:52px}.list .item{padding:12px;border-radius:16px;background:#f7faff;border:1px solid #dbe6f2;margin:8px 0}.item h3{margin:0 0 4px}.small{font-size:13px;color:var(--muted);font-weight:700}.tag{display:inline-block;background:#e8f1ff;color:#044d91;border-radius:99px;padding:5px 8px;margin:2px;font-size:12px;font-weight:900}.adminbox{border:2px dashed #b8cae0;background:#fbfdff;border-radius:18px;padding:14px;margin:10px 0}.hidden{display:none!important}.footer-space{height:84px}.notice{background:#fff8dc;border:1px solid #f0d66b;border-radius:16px;padding:11px;font-weight:750}.rail{height:22px;background:linear-gradient(90deg,#333 0 8%,transparent 8% 16%);background-size:32px 8px;border-top:4px solid #555;border-bottom:4px solid #555;margin:8px 0;border-radius:4px}.center{text-align:center}@media(min-width:850px){.wrap{max-width:900px}.main{display:grid;grid-template-columns:430px 1fr;gap:18px}.tabs{max-width:430px;margin:0 auto}}
</style>
</head>
<body><div class="wrap"><header class="top"><div class="logo" aria-label="Safety Sprint logo"><svg viewBox="0 0 120 120" role="img"><circle cx="60" cy="60" r="55" fill="#ffd23f" stroke="#061a33" stroke-width="6"/><path d="M26 33l61 61M87 33L26 94" stroke="#fff" stroke-width="14" stroke-linecap="round"/><path d="M26 33l61 61M87 33L26 94" stroke="#061a33" stroke-width="5" stroke-linecap="round"/><circle cx="34" cy="83" r="8" fill="#e33b3b" stroke="#061a33" stroke-width="4"/><circle cx="86" cy="83" r="8" fill="#e33b3b" stroke="#061a33" stroke-width="4"/><text x="60" y="31" text-anchor="middle" font-size="16" font-weight="900" fill="#061a33">RR</text><text x="60" y="109" text-anchor="middle" font-size="14" font-weight="900" fill="#061a33">SAFE</text></svg></div><div class="title"><h1>Conrail Safety Sprint</h1><p>Get the green signal.</p></div></header><main id="app"></main><div class="footer-space"></div></div><script>
(function(){
const LS='css_clean_v1';
const initial={user:null,screen:'login',tab:'play',settings:{teamsEnabled:true},team:null,teams:[{id:'north',name:'North Jersey Crew',points:18500,members:8},{id:'south',name:'South Jersey Switchers',points:20400,members:9},{id:'detroit',name:'Detroit Yard Hawks',points:16200,members:6}],sessions:[],tickets:0,streak:0,badges:[],lastMissed:[]};
const data={questions:[
{id:1,rule:'OR-101',category:'Operating Rules',difficulty:'Easy',q:'You see conflicting instructions before a move. What should you do first?',a:['Keep moving if the track looks clear','Ask about it after the move','Stop and verify the instruction','Ignore the newer instruction'],c:2,e:'When instructions conflict, stop and verify before continuing.'},
{id:2,rule:'SAFE-201',category:'Personal Safety',difficulty:'Easy',q:'A shortcut saves time but skips required protection. What is the safe choice?',a:['Take the shortcut if no one sees','Skip only if behind schedule','Use the required safe procedure','Let the newest employee decide'],c:2,e:'Required protection and safe procedure always come before speed.'},
{id:3,rule:'PPE-301',category:'PPE',difficulty:'Easy',q:'You notice required PPE is missing before entering a work area. What should happen?',a:['Enter quickly','Borrow later','Stop until PPE is corrected','Work farther away'],c:2,e:'Do not enter the work area until required PPE is in place.'},
{id:4,rule:'COMM-401',category:'Communication',difficulty:'Medium',q:'A radio message is unclear during a movement. What should you do?',a:['Guess the message','Continue slowly','Stop and request clarification','Use hand signals later'],c:2,e:'Unclear communication must be clarified before action continues.'},
{id:5,rule:'YARD-501',category:'Yard Safety',difficulty:'Medium',q:'You are unsure if the route is properly lined. What is the right move?',a:['Proceed because it was lined yesterday','Stop and verify the route','Ask after passing it','Let the timer decide'],c:1,e:'When unsure, stop and verify the route before proceeding.'},
{id:6,rule:'HAZ-601',category:'Hazmat',difficulty:'Medium',q:'You see a possible leak or unknown spill near equipment. What comes first?',a:['Touch it to identify it','Move closer for a photo','Stay clear and report it','Wash it away'],c:2,e:'Stay clear and report possible hazmat concerns immediately.'}
],rules:[
{id:'OR-101',title:'Conflicting Instructions',cat:'Operating Rules',text:'If instructions conflict or are unclear, stop, verify, and clarify before continuing. Do not guess.'},
{id:'SAFE-201',title:'No Shortcuts Around Protection',cat:'Personal Safety',text:'Required protection and safe work procedures must be followed every time, even when work is delayed.'},
{id:'PPE-301',title:'Required PPE',cat:'PPE',text:'Employees must use required PPE before entering designated work areas or performing tasks requiring protection.'},
{id:'COMM-401',title:'Clear Communication',cat:'Communication',text:'Unclear radio, verbal, or written communication must be repeated or clarified before action is taken.'},
{id:'YARD-501',title:'Verify Route and Conditions',cat:'Yard Safety',text:'When unsure about route, track condition, or authority, stop and verify before proceeding.'},
{id:'HAZ-601',title:'Unknown Spill or Leak',cat:'Hazmat',text:'Stay clear of possible hazardous materials and report immediately through approved channels.'}
]};
let S=load(); let game=null;
function load(){try{const s=JSON.parse(localStorage.getItem(LS)||'null');return {...initial,...s,settings:{...initial.settings,...(s&&s.settings)}}}catch(e){return {...initial}}}
function save(){localStorage.setItem(LS,JSON.stringify(S))}
function esc(x){return String(x||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function points(){return S.sessions.reduce((n,s)=>n+s.score,0)}
function level(){const p=points(); if(p>=15000)return 'Blue Badge Boss'; if(p>=10000)return 'Rule Wrangler'; if(p>=6000)return 'Safety Switchman'; if(p>=3000)return 'Signal Spotter'; if(p>=1000)return 'Track Trainee'; return 'Yard Rookie'}
function nav(active){return `<nav class="tabs">${[['play','Play'],['teams','Teams'],['rules','Rules'],['board','Board'],['me','Me']].map(([k,v])=>`<button class="tab ${active===k?'active':''}" onclick="go('${k}')">${v}</button>`).join('')}</nav>`}
window.go=function(t){S.tab=t;S.screen='home';save();render()}
window.resetApp=function(){localStorage.removeItem(LS);S={...initial};render()}
window.login=function(){const email=document.getElementById('email').value.trim().toLowerCase(); if(!email.endsWith('@conrail.com')){msg('Whoa there, wrong track. Use your @conrail.com email.');return} S.user={email,nick:'',team:''}; S.screen='profile'; save(); render()}
window.demo=function(){S.user={email:'demo.manager@conrail.com',nick:'Big Mike',team:'North Jersey'};S.team='north';S.screen='home';S.tab='play';save();render()}
window.saveProfile=function(){S.user.nick=document.getElementById('nick').value.trim()||'Safety Sprinter';S.user.team=document.getElementById('team').value.trim()||'North Jersey';S.screen='home';save();render()}
window.startGame=function(mode='daily'){game={mode,i:0,score:0,correct:0,answers:[],qs:[...data.questions].sort(()=>Math.random()-.5).slice(0,mode==='boss'?6:5)};S.screen='game';render()}
window.answer=function(idx){const q=game.qs[game.i], ok=idx===q.c; let add=ok?100:0; if(ok){game.correct++; if(game.correct===3)add+=100} game.score+=add; game.answers.push({qid:q.id,sel:idx,ok}); S.screen='feedback'; render()}
window.nextQ=function(){game.i++; if(game.i>=game.qs.length){finish()}else{S.screen='game'} render()}
function finish(){const missed=game.answers.filter(a=>!a.ok).map(a=>data.questions.find(q=>q.id===a.qid)); const bonus=game.correct===game.qs.length?500:0; game.score+=250+bonus; S.tickets+=(1+(bonus?1:0)); S.streak+=1; S.lastMissed=missed.map(q=>q.rule); S.sessions.unshift({date:new Date().toLocaleDateString(),mode:game.mode,score:game.score,correct:game.correct,total:game.qs.length}); if(game.correct===game.qs.length&&!S.badges.includes('Green Signal'))S.badges.push('Green Signal'); if(S.streak>=7&&!S.badges.includes('Streak Engine'))S.badges.push('Streak Engine'); S.screen='results'; save()}
window.createTeam=function(){const name=document.getElementById('newteam').value.trim(); if(!name)return; const id='team'+Date.now(); S.teams.push({id,name,points:0,members:1}); S.team=id; save();render()}
window.joinTeam=function(id){S.team=id;save();render()}
window.toggleTeams=function(){S.settings.teamsEnabled=!S.settings.teamsEnabled;save();render()}
window.importSample=function(){msg('CSV importer is ready in prototype mode. Next build can connect real upload parsing to these same question fields.');}
function msg(t){document.getElementById('app').insertAdjacentHTML('afterbegin',`<div class="card notice">${esc(t)}</div>`)}
function loginView(){return `<section class="card hero"><div class="signal">🚦</div><div class="big">Locked Rail Yard</div><p class="sub">Only verified @conrail.com emails can enter.</p><input id="email" class="input" placeholder="name@conrail.com" inputmode="email"><button class="btn full" onclick="login()">Send Magic Link</button><button class="btn ghost full" style="margin-top:10px" onclick="demo()">Demo Unlock</button><p class="small">Prototype note: real launch needs backend domain enforcement.</p></section>`}
function profileView(){return `<section class="card"><h2>Build Your Crew Card</h2><input id="nick" class="input" placeholder="Nickname"><input id="team" class="input" placeholder="Team / Terminal"><label class="small"><input type="checkbox" checked> I understand this app tracks game progress for safety learning rewards.</label><br><br><button class="btn full green" onclick="saveProfile()">Enter the Yard</button></section>`}
function home(){return `<div class="main"><section><div class="card hero"><div class="rail"></div><div class="big">Today's Safety Sprint</div><p class="sub">One minute. Five questions. Safer every day.</p><button class="btn full yellow" onclick="startGame('daily')">🚂 Start Today's Sprint</button><button class="btn full ghost" style="margin-top:10px" onclick="startGame('boss')">👾 Friday Boss Battle</button></div><div class="card statgrid"><div class="stat"><span class="small">Level</span><br><b>${level()}</b></div><div class="stat"><span class="small">Points</span><br><b>${points()}</b></div><div class="stat"><span class="small">Streak</span><br><b>${S.streak} days</b></div><div class="stat"><span class="small">Tickets</span><br><b>${S.tickets}</b></div></div></section><section>${rulesMini()}${nav('play')}</section></div>`}
function gameView(){const q=game.qs[game.i]; const pct=(game.i/game.qs.length)*100;return `<section class="card"><div class="small">Question ${game.i+1} of ${game.qs.length} • ${esc(q.category)}</div><div class="bar"><span style="width:${pct+10}%"></span></div><div class="qbox">${esc(q.q)}</div>${q.a.map((a,i)=>`<button class="choice" onclick="answer(${i})"><b>${'ABCD'[i]}.</b> ${esc(a)}</button>`).join('')}</section>`}
function feedback(){const last=game.answers.at(-1), q=data.questions.find(x=>x.id===last.qid);return `<section class="card center"><div class="signal">${last.ok?'✅':'🚧'}</div><div class="big">${last.ok?'Green Signal!':'Red Signal!'}</div><p class="sub">${last.ok?'Safe choice locked in.':'Not quite. Let’s reroute.'}</p><div class="notice"><b>Correct:</b> ${esc(q.a[q.c])}<br>${esc(q.e)}</div><br><button class="btn full" onclick="nextQ()">${game.i+1>=game.qs.length?'See Results':'Next Question'}</button></section>`}
function results(){return `<section class="card center"><div class="signal">🏁</div><div class="big">Sprint Complete!</div><div class="statgrid"><div class="stat"><span class="small">Score</span><br><b>${game.score}</b></div><div class="stat"><span class="small">Correct</span><br><b>${game.correct}/${game.qs.length}</b></div><div class="stat"><span class="small">Tickets</span><br><b>+${game.correct===game.qs.length?2:1}</b></div><div class="stat"><span class="small">Streak</span><br><b>${S.streak}</b></div></div>${S.lastMissed.length?`<div class="notice"><b>Review these rules:</b><br>${S.lastMissed.map(r=>`<span class="tag">${r}</span>`).join('')}<br><button class="btn ghost" onclick="go('rules')">Open Rule Dictionary</button></div>`:'<p class="sub">Perfect round. Green Signal badge earned.</p>'}<button class="btn full yellow" onclick="startGame('daily')">Play Again</button>${nav('play')}</section>`}
function teams(){return `<section class="card"><h2>Team Competition</h2><p class="sub">${S.settings.teamsEnabled?'Team play is enabled.':'Team play is currently disabled by admin.'}</p>${S.settings.teamsEnabled?`<div class="row"><input id="newteam" class="input" placeholder="Create team name"><button class="btn" onclick="createTeam()">Create</button></div><div class="list">${S.teams.sort((a,b)=>b.points-a.points).map((t,i)=>`<div class="item"><h3>${i+1}. ${esc(t.name)} ${S.team===t.id?'✅':''}</h3><span class="small">${t.points} points • ${t.members} members</span><br><button class="btn ghost" onclick="joinTeam('${t.id}')">Join Team</button></div>`).join('')}</div>`:''}${nav('teams')}</section>`}
function rulesMini(){return `<div class="card"><h2>Rule Dictionary</h2><p class="sub">Searchable reference for missed questions and self-study.</p>${data.rules.slice(0,3).map(r=>`<span class="tag">${r.id}</span>`).join('')}</div>`}
function rules(){const q=(document.getElementById('rsearch')||{}).value||''; const rows=data.rules.filter(r=>(r.title+r.cat+r.id+r.text).toLowerCase().includes(q.toLowerCase()));return `<section class="card"><h2>Rule Dictionary</h2><input id="rsearch" class="input" placeholder="Search rules" value="${esc(q)}" oninput="go('rules')"><div class="list">${rows.map(r=>`<div class="item"><h3>${esc(r.id)} — ${esc(r.title)}</h3><span class="tag">${esc(r.cat)}</span><p>${esc(r.text)}</p></div>`).join('')}</div>${nav('rules')}</section>`}
function board(){const players=[['TrackBoss92','South Jersey',4500],['Big Mike','North Jersey',points()||4250],['RailRanger','Detroit',3900],['SignalSam','North Jersey',3100]].sort((a,b)=>b[2]-a[2]);return `<section class="card"><h2>Leaderboard</h2><h3>Weekly Individual</h3><div class="list">${players.map((p,i)=>`<div class="item"><b>${i+1}. ${p[0]}</b><br><span class="small">${p[1]} • ${p[2]} points</span></div>`).join('')}</div><h3>Team Standings</h3><div class="list">${S.teams.sort((a,b)=>b.points-a.points).map((t,i)=>`<div class="item"><b>${i+1}. ${esc(t.name)}</b><br><span class="small">${t.points} points</span></div>`).join('')}</div>${nav('board')}</section>`}
function me(){return `<section class="card"><h2>My Profile</h2><p><b>Email:</b> ${esc(S.user.email)}</p><p><b>Nickname:</b> ${esc(S.user.nick||'Safety Sprinter')}</p><p><b>Level:</b> ${level()}</p><p><b>Badges:</b> ${S.badges.length?S.badges.map(b=>`<span class="tag">${b}</span>`).join(''):'No badges yet'}</p><button class="btn ghost full" onclick="S.screen='admin';render()">Open Admin Dashboard</button><button class="btn red full" style="margin-top:10px" onclick="resetApp()">Reset Demo App</button>${nav('me')}</section>`}
function admin(){return `<section class="card"><h2>Manager Dashboard</h2><div class="adminbox"><b>Team competition</b><p class="small">Allow employees to create and join teams.</p><button class="btn ${S.settings.teamsEnabled?'red':'green'}" onclick="toggleTeams()">${S.settings.teamsEnabled?'Disable':'Enable'} Teams</button></div><div class="adminbox"><b>Import Questions</b><p class="small">CSV fields: question, choice_a, choice_b, choice_c, choice_d, correct_answer, explanation, category, difficulty, source.</p><button class="btn ghost" onclick="importSample()">Preview Importer</button></div><div class="statgrid"><div class="stat"><span class="small">Active players</span><br><b>84</b></div><div class="stat"><span class="small">Avg score</span><br><b>78%</b></div></div><br><button class="btn full" onclick="S.screen='home';S.tab='me';render()">Back</button></section>`}
function render(){const A=document.getElementById('app'); if(!S.user) A.innerHTML=loginView(); else if(S.screen==='profile')A.innerHTML=profileView(); else if(S.screen==='game')A.innerHTML=gameView(); else if(S.screen==='feedback')A.innerHTML=feedback(); else if(S.screen==='results')A.innerHTML=results(); else if(S.screen==='admin')A.innerHTML=admin(); else if(S.tab==='teams')A.innerHTML=teams(); else if(S.tab==='rules')A.innerHTML=rules(); else if(S.tab==='board')A.innerHTML=board(); else if(S.tab==='me')A.innerHTML=me(); else A.innerHTML=home();}
window.addEventListener('error',e=>{document.getElementById('app').innerHTML='<section class="card"><h2>App Error</h2><p>'+esc(e.message)+'</p><button class="btn" onclick="resetApp()">Reset</button></section>'});
if(new URLSearchParams(location.search).has('reset')){localStorage.removeItem(LS);S={...initial};history.replaceState(null,'',location.pathname)}
render();
})();
</script></body></html>
